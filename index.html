<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Personnages Bibliques">
<meta name="description" content="Découvrez la vie des grands personnages de la Bible">
<title>Personnages Bibliques</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --parch: #f2e8d0;
  --parch2: #e8d8b0;
  --parch3: #d4c090;
  --ink: #1a0e00;
  --ink2: #3d2800;
  --ink3: #6b4a1a;
  --gold: #8b6914;
  --gold2: #c49a28;
  --gold3: #e8c050;
  --red: #7a1a1a;
  --sepia: #5c3d1a;
  --border: #c4a050;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--ink); overflow: hidden; }
body { font-family: 'EB Garamond', Georgia, serif; color: var(--ink); }

/* ===== LAYOUT ===== */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: var(--parch); background-image: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(139,105,20,0.04) 28px, rgba(139,105,20,0.04) 29px); }

/* ===== HEADER ===== */
#header {
  background: var(--ink);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 2px solid var(--gold2);
  flex-shrink: 0;
  position: relative;
}
#header::after {
  content: '';
  position: absolute; bottom: -5px; left: 0; right: 0;
  height: 3px;
  background: repeating-linear-gradient(90deg, var(--gold3) 0, var(--gold3) 8px, transparent 8px, transparent 16px);
}
#header-titles { flex: 1; }
#header h1 { font-family: 'Cinzel Decorative', serif; font-size: 14px; font-weight: 700; color: var(--gold3); letter-spacing: 0.06em; line-height: 1.2; }
#header p { font-size: 10px; color: var(--parch3); letter-spacing: 0.12em; margin-top: 2px; font-family: 'Cinzel', serif; }

/* ===== LANG ===== */
#lang-bar { display: flex; gap: 4px; }
.lang-btn { font-family: 'Cinzel', serif; font-size: 10px; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--gold); cursor: pointer; color: var(--parch3); background: transparent; transition: all 0.15s; }
.lang-btn.active { background: var(--gold2); color: var(--ink); border-color: var(--gold3); }

/* ===== SEARCH BAR ===== */
#search-bar {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--parch3);
  background: var(--parch);
  flex-shrink: 0;
}
#search-row { display: flex; gap: 8px; margin-bottom: 8px; }
#search-input {
  flex: 1; font-family: 'EB Garamond', serif; font-size: 16px;
  padding: 8px 12px; border: 1px solid var(--border);
  border-radius: 4px; background: #fff9ee; color: var(--ink);
  outline: none;
}
#search-input:focus { border-color: var(--gold2); }
#search-input::placeholder { color: var(--ink3); font-style: italic; }
#dropdown-wrap { position: relative; }
#char-select {
  font-family: 'Cinzel', serif; font-size: 11px;
  padding: 8px 28px 8px 10px; border: 1px solid var(--border);
  border-radius: 4px; background: #fff9ee; color: var(--ink2);
  cursor: pointer; appearance: none; outline: none;
  min-width: 140px;
}
#dropdown-arrow { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 10px; color: var(--gold2); }

/* ===== CHAR CHIPS ===== */
#char-chips { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
#char-chips::-webkit-scrollbar { display: none; }
.chip { font-family: 'Cinzel', serif; font-size: 10px; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border); cursor: pointer; color: var(--ink2); background: var(--parch2); white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
.chip.active { background: var(--ink); color: var(--gold3); border-color: var(--gold2); }

/* ===== CONTENT ===== */
#content { flex: 1; overflow-y: auto; padding: 0; }
#content::-webkit-scrollbar { width: 4px; }
#content::-webkit-scrollbar-thumb { background: var(--parch3); border-radius: 2px; }

/* ===== HOME ===== */
#home { padding: 16px; }
#home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.char-card {
  background: var(--parch2); border: 1px solid var(--border);
  border-radius: 6px; padding: 14px 10px; cursor: pointer;
  text-align: center; transition: all 0.15s;
  position: relative; overflow: hidden;
}
.char-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--gold2); }
.char-card:hover { border-color: var(--gold2); background: #fff9ee; transform: translateY(-1px); }
.char-card-icon { font-size: 32px; margin-bottom: 6px; display: block; }
.char-card-name { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; color: var(--ink); display: block; margin-bottom: 3px; }
.char-card-era { font-size: 11px; color: var(--ink3); font-style: italic; }
.char-card-count { font-size: 10px; color: var(--gold); margin-top: 4px; font-family: 'Cinzel', serif; }

/* ===== CHAR DETAIL ===== */
#char-detail { display: none; }
#char-header {
  background: var(--ink); padding: 16px;
  border-bottom: 2px solid var(--gold2);
  position: relative;
}
#char-header::after { content: ''; position: absolute; bottom: -5px; left: 0; right: 0; height: 3px; background: repeating-linear-gradient(90deg, var(--gold3) 0, var(--gold3) 6px, transparent 6px, transparent 12px); }
#back-btn { font-family: 'Cinzel', serif; font-size: 11px; color: var(--parch3); cursor: pointer; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 4px; background: none; border: none; }
#back-btn:hover { color: var(--gold3); }
#char-name { font-family: 'Cinzel Decorative', serif; font-size: 20px; color: var(--gold3); margin-bottom: 4px; }
#char-meta { font-size: 13px; color: var(--parch3); font-style: italic; margin-bottom: 8px; }
#char-intro { font-size: 14px; color: var(--parch2); line-height: 1.65; }
#char-events { padding: 16px; }
#char-events h2 { font-family: 'Cinzel', serif; font-size: 13px; color: var(--ink3); letter-spacing: 0.08em; margin-bottom: 14px; border-bottom: 1px solid var(--parch3); padding-bottom: 6px; }

/* ===== EVENT CARD ===== */
.ev-block {
  margin-bottom: 20px; border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden; background: #fff9ee;
}
.ev-illustration {
  width: 100%; background: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--border); overflow: hidden;
  min-height: 160px; max-height: 240px;
}
.ev-illustration img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  filter: sepia(20%) contrast(1.05);
  display: block;
}
.ev-body { padding: 12px 14px; }
.ev-ref { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); font-weight: 600; margin-bottom: 4px; letter-spacing: 0.05em; }
.ev-title { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.ev-text { font-size: 15px; color: var(--ink2); line-height: 1.7; margin-bottom: 8px; }
.ev-hist { font-size: 13px; color: var(--ink3); font-style: italic; line-height: 1.55; padding: 8px 10px; background: var(--parch2); border-left: 3px solid var(--gold2); }
.ev-hist strong { font-style: normal; color: var(--sepia); display: block; margin-bottom: 2px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.04em; }

/* ===== MOBILE ===== */
@media (max-width: 400px) {
  #home-grid { grid-template-columns: repeat(2, 1fr); }
  #char-name { font-size: 16px; }
}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-titles">
      <h1>Personnages Bibliques</h1>
      <p>VIES · RÉCITS · RÉFÉRENCES</p>
    </div>
    <div id="lang-bar">
      <button class="lang-btn active" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('mg')">MG</button>
    </div>
  </div>

  <div id="search-bar">
    <div id="search-row">
      <input type="text" id="search-input" placeholder="Rechercher un personnage..." oninput="onSearch(this.value)">
      <div id="dropdown-wrap">
        <select id="char-select" onchange="selectFromDropdown(this.value)">
          <option value="">— Choisir —</option>
        </select>
        <span id="dropdown-arrow">▼</span>
      </div>
    </div>
    <div id="char-chips"></div>
  </div>

  <div id="content">
    <div id="home">
      <div id="home-grid"></div>
    </div>
    <div id="char-detail">
      <div id="char-header">
        <button id="back-btn" onclick="showHome()">← Retour</button>
        <div id="char-name"></div>
        <div id="char-meta"></div>
        <div id="char-intro"></div>
      </div>
      <div id="char-events">
        <h2 id="events-title">CHRONOLOGIE DE SA VIE</h2>
        <div id="events-list"></div>
      </div>
    </div>
  </div>

</div>
