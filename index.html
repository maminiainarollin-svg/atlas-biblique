       text:{fr:'Noé entre dans l\'arche avec sa famille et deux animaux de chaque espèce. Pendant 40 jours et 40 nuits, la pluie tombe. Les eaux montent et couvrent tous les monts. Tout être vivant périt. L\'arche flotte sur les eaux pendant 150 jours.',en:'Noah enters the ark with his family and two animals of each species. For 40 days and 40 nights, rain falls. The waters rise and cover all mountains. Every living being perishes. The ark floats on the waters for 150 days.',mg:'Niditra tao amin\'ny sambo i Noa sy ny fianakaviany ary biby roa avy amin\'ny karazany tsirairay.'},
       hist:{fr:'Le récit du déluge existe dans de nombreuses cultures : l\'Épopée de Gilgamesh sumérienne (~2100 av. J.-C.) est la version la plus proche du récit biblique.',en:'The flood narrative exists in many cultures: the Sumerian Epic of Gilgamesh (~2100 BC) is the closest version to the biblical account.',mg:'Ny tantaran\'ny sakan\'ny rano dia misy amin\'ny kolontsaina maro: ny Épopée an\'i Gilgamesh (~2100 tal. J.-K.) no akaiky indrindra amin\'ny Baiboly.'}},
      {ref:'Gen 9:1-17', title:{fr:'L\'alliance de l\'arc-en-ciel',en:'The rainbow covenant',mg:'Ny fanekena amin\'ny avana'}, illus:'noe_arc',
       text:{fr:'Après le déluge, Dieu bénit Noé et ses fils. Il conclut une alliance éternelle : "Je mettrai mon arc dans la nuée, et il servira de signe d\'alliance entre moi et la terre. Les eaux ne deviendront plus un déluge pour détruire toute chair."',en:'After the flood, God blesses Noah and his sons. He makes an eternal covenant: "I have set my rainbow in the clouds, and it will be the sign of the covenant between me and the earth. Never again will the waters become a flood to destroy all life."',mg:'Taorian\'ny sakan\'ny rano, nitso-drano an\'i Noa sy ny zanany i Andriamanitra. Nanao fanekena mandrakizay izy.'},
       hist:{fr:'Cette alliance noachique est considérée par la théologie juive et chrétienne comme une alliance universelle — pour toute l\'humanité, pas seulement Israël.',en:'This Noahic covenant is considered by Jewish and Christian theology as a universal covenant — for all humanity, not just Israel.',mg:'Io fanekena Noa io dia atao hoe fanekena maneran-tany ho an\'ny olombelona rehetra.'}}
    ]
  },

  abraham: {
    name:{fr:'Abraham',en:'Abraham',mg:'Abrahama'},
    era:{fr:'~2000-1800 av. J.-C.',en:'~2000-1800 BC',mg:'~2000-1800 tal. J.-K.'},
    testament:'AT',
    icon:'⭐',
    intro:{
      fr:'Abraham est le père de la foi pour les trois grandes religions monothéistes. Appelé depuis Ur de Chaldée, il obéit à Dieu sans connaître sa destination. Par sa foi et son obéissance totale — jusqu\'au sacrifice de son fils unique — il devint le père de toutes les nations.',
      en:'Abraham is the father of faith for the three great monotheistic religions. Called from Ur of the Chaldeans, he obeyed God without knowing his destination. Through his faith and total obedience — to the sacrifice of his only son — he became the father of all nations.',
      mg:'I Abrahama no rain\'ny finoana ho an\'ny fivavahana lehibe telo. Nantsoina avy tany Ora Kaldeana izy ka nankatò an\'Andriamanitra nefa tsy nahalala ny toerana hiakohana.'
    },
    events:[
      {ref:'Gen 12:1-9', title:{fr:'L\'appel et le départ vers Canaan',en:'The call and departure to Canaan',mg:'Ny fiantsoana sy ny niala nankany Kanana'}, illus:'abr_appel',
       text:{fr:'À Haran, Dieu appelle Abram : "Va vers le pays que je te montrerai. Je ferai de toi une grande nation, je te bénirai, je rendrai ton nom grand et tu seras une source de bénédiction." À 75 ans, Abram part avec Saraï, Lot, et tous ses biens.',en:'At Haran, God calls Abram: "Go to the land I will show you. I will make you a great nation, I will bless you, I will make your name great and you will be a blessing." At 75, Abram leaves with Sarai, Lot, and all his possessions.',mg:'Tany Harana, niantso an\'i Abrama i Andriamanitra: "Mandehana ho any amin\'ny tany izay hasehoko anao." Tamin\'ny faha-75 taonany, niala i Abrama.'},
       hist:{fr:'La promesse à Abraham (Gen 12:3 : "en toi seront bénies toutes les familles de la terre") est citée par Paul (Gal 3:8) comme annonce anticipée de l\'Évangile.',en:'The promise to Abraham (Gen 12:3: "in you all families of the earth shall be blessed") is cited by Paul (Gal 3:8) as an advance announcement of the Gospel.',mg:'Ny teny fikasana tamin\'i Abrahama (Gen 12:3) dia voatonon\'i Paoly (Gal 3:8) ho fampahafantarana mialoha ny Filazantsara.'}},
      {ref:'Gen 15', title:{fr:'L\'alliance de la nuit',en:'The covenant of the night',mg:'Ny fanekena tamin\'ny alina'}, illus:'abr_alliance',
       text:{fr:'Abram s\'inquiète de ne pas avoir d\'héritier. Dieu le fait sortir et dit : "Regarde les étoiles et compte-les si tu le peux. Telle sera ta postérité." Puis Dieu conclut solennellement l\'alliance en passant entre les animaux coupés en deux sous forme de torche de feu.',en:'Abram worries about having no heir. God brings him outside and says: "Look at the stars and count them if you can. So shall your offspring be." Then God solemnly makes the covenant by passing between the cut animals as a flaming torch.',mg:'Nanana ahiahy i Abrama noho tsy nisiany mpandova. Nentin\'Andriamanitra nivoaka izy ka niteny: "Jereo ny kintana ka isao raha azonao isaina."'},
       hist:{fr:'Le rituel de l\'alliance par le passage entre des animaux partagés est attesté dans des textes akkadiens du IIème millénaire — Abraham utilise les codes juridiques de son époque.',en:'The covenant ritual of passing between divided animals is attested in Akkadian texts of the 2nd millennium — Abraham uses the legal codes of his time.',mg:'Ny fombam-panekena tamin\'ny nandalo teo anelanelan\'ny biby voaparaka dia voaporofo tamin\'ny lahatsoratra akkadiana.'}},
      {ref:'Gen 17-18', title:{fr:'La naissance promise d\'Isaac',en:'The promised birth of Isaac',mg:'Ny nahaterahan\'i Isaka nampanantenaina'}, illus:'abr_anges',
       text:{fr:'Abraham a 99 ans, Sara 90. Dieu renouvelle l\'alliance et annonce qu\'ils auront un fils dans un an. Trois visiteurs mystérieux arrivent à Mambré — Sara rit d\'incrédulité derrière la tente. Dieu dit : "Y a-t-il rien de trop difficile pour l\'Éternel ?"',en:'Abraham is 99, Sarah 90. God renews the covenant and announces they will have a son within a year. Three mysterious visitors arrive at Mamre — Sarah laughs in disbelief behind the tent. God says: "Is anything too hard for the Lord?"',mg:'I Abrahama 99 taona, i Sara 90. Havaozin\'Andriamanitra ny fanekena ka milaza hoe hiteraka zazalahy ao anatin\'ny taona iray izy ireo.'},
       hist:{fr:'La naissance d\'Isaac à cet âge est présentée comme un miracle de Dieu. Le nom Isaac (Yitzhak) vient du verbe rire (tsahaq) — en référence au rire de Sara.',en:'Isaac\'s birth at this age is presented as a miracle of God. The name Isaac (Yitzhak) comes from the verb to laugh (tsahaq) — referring to Sarah\'s laughter.',mg:'Ny nahaterahan\'i Isaka tamin\'io taona io dia asehon\'Andriamanitra ho fahagagana. Ny anaran\'i Isaka (Yitzhak) dia avy amin\'ny fidinana hoe "mihomehy".'}},
      {ref:'Gen 22', title:{fr:'Le sacrifice d\'Isaac — sommet de la foi',en:'The sacrifice of Isaac — summit of faith',mg:'Ny fanatitry ny zanak\'i Abrahama — tampon\'ny finoana'}, illus:'abr_isaac',
       text:{fr:'Dieu met Abraham à l\'épreuve : "Prends ton fils, ton unique, Isaac que tu aimes, et offre-le en holocauste sur l\'une des montagnes que je te dirai." Abraham obéit. Au moment décisif sur le mont Morija, l\'ange le retient : "Ne porte pas la main sur l\'enfant ! Car je sais que tu crains Dieu." Un bélier est fourni.',en:'God tests Abraham: "Take your son, your only son, Isaac whom you love, and offer him as a burnt offering on one of the mountains I will tell you." Abraham obeys. At the decisive moment on Mount Moriah, the angel stops him: "Do not lay a hand on the boy! Now I know that you fear God." A ram is provided.',mg:'Nitsapa an\'i Abrahama i Andriamanitra: "Ento ny zanakao, Isaka izay tiananao, ka manatera azy."'},
       hist:{fr:'La tradition juive nomme cet épisode "l\'Akedah" (ligature d\'Isaac). Il est lu chaque année pour Rosh Hashana. Pour les chrétiens, il préfigure le sacrifice du Christ sur le Golgotha.',en:'Jewish tradition calls this episode the "Akedah" (binding of Isaac). It is read every year for Rosh Hashana. For Christians, it foreshadows the sacrifice of Christ at Golgotha.',mg:'Ny fomba amam-panaon\'ny Jody dia mantsoin\'izy ireo hoe "Akedah" (fatorana an\'i Isaka) ity tantara ity.'}}
    ]
  },

  moise: {
    name:{fr:'Moïse',en:'Moses',mg:'Mosesy'},
    era:{fr:'~1400-1280 av. J.-C.',en:'~1400-1280 BC',mg:'~1400-1280 tal. J.-K.'},
    testament:'AT',
    icon:'🔥',
    intro:{
      fr:'Moïse est le plus grand prophète de l\'Ancien Testament. Élevé à la cour de Pharaon puis berger dans le désert, il fut appelé au buisson ardent pour libérer son peuple. Médiateur de l\'alliance au Sinaï, législateur, conducteur d\'Israël pendant 40 ans — il mourut aux portes de la Terre promise.',
      en:'Moses is the greatest prophet of the Old Testament. Raised at Pharaoh\'s court then shepherd in the desert, he was called at the burning bush to free his people. Mediator of the Sinai covenant, lawgiver, leader of Israel for 40 years — he died at the gates of the Promised Land.',
      mg:'I Mosesy no mpaminany lehibe indrindra ao amin\'ny Testamenta Taloha. Notezaina tao amin\'ny tokontany Farao, nantsoina teo amin\'ny voarobelona mirehitra hanafaka ny vahoakany.'
    },
    events:[
      {ref:'Ex 2:1-10', title:{fr:'Naissance et sauvetage sur le Nil',en:'Birth and rescue on the Nile',mg:'Nahaterahan\'i Mosesy sy nanavotana azy tamin\'ny Neily'}, illus:'moise_nil',
       text:{fr:'Pharaon ordonne de noyer tous les nouveau-nés hébreux mâles. Jokébed cache son fils 3 mois, puis le dépose dans une corbeille de papyrus sur le Nil. La fille de Pharaon le découvre et l\'adopte. Sa propre mère devient sa nourrice. Il est élevé comme prince d\'Égypte.',en:'Pharaoh orders all Hebrew male newborns drowned. Jochebed hides her son 3 months, then places him in a papyrus basket on the Nile. Pharaoh\'s daughter finds and adopts him. His own mother becomes his wet nurse. He is raised as a prince of Egypt.',mg:'Nasain\'ny Farao hotafinina ny zazalahy hebreo rehetra. Nafenin\'i Jokebed ny zanany 3 volana, dia napetrany tao amin\'ny sobika papirosy teo amin\'ny Neily.'},
       hist:{fr:'Le Nil était sacré pour les Égyptiens (dieu Hâpi). La légende du héros exposé sur l\'eau existait avant Moïse (Sargon d\'Akkad). Providence divine dans l\'usage des structures du monde.',en:'The Nile was sacred to Egyptians (god Hapi). The legend of the hero exposed on water predates Moses (Sargon of Akkad). Divine providence in the use of the world\'s structures.',mg:'Ny Neily dia masina ho an\'ny Egyptiana (andriamanitra Hâpi).'}},
      {ref:'Ex 3:1-15', title:{fr:'Le buisson ardent — révélation du nom divin',en:'The burning bush — revelation of the divine name',mg:'Ny voarobelona mirehitra — fanambarana ny anaran\'Andriamanitra'}, illus:'moise_buisson',
       text:{fr:'Moïse garde les troupeaux au pied du mont Horeb. Un buisson brûle sans se consumer. "Moïse, Moïse !" Dieu lui révèle son nom : "Je suis celui qui suis" (YHWH) et lui confie la mission : "Tu feras sortir mon peuple d\'Égypte."',en:'Moses tends flocks at the foot of Mount Horeb. A bush burns without being consumed. "Moses, Moses!" God reveals his name: "I AM WHO I AM" (YHWH) and gives him the mission: "You will bring my people out of Egypt."',mg:'Niandry ondry teo am-pototry ny Tendrombohitra Horeba i Mosesy. Nirehitra nefa tsy leban\'ny afo ny voarobelona.'},
       hist:{fr:'YHWH (Yahvé) est le nom propre de Dieu dans la Bible hébraïque — si saint que les Juifs ne le prononcent pas. Il signifie l\'être pur, l\'existence absolue. Jésus reprend "Je suis" en Jean 8:58.',en:'YHWH (Yahweh) is God\'s proper name in the Hebrew Bible — so holy that Jews do not pronounce it. It means pure being, absolute existence. Jesus takes up "I AM" in John 8:58.',mg:'I YHWH (Yahveh) no anaran\'Andriamanitra ao amin\'ny Baiboly hebreo — masina loatra ka tsy lazain\'ny Jody.'}},
      {ref:'Ex 19-20', title:{fr:'La Loi donnée au Sinaï',en:'The Law given at Sinai',mg:'Ny Lalàna nomena tany Sinay'}, illus:'moise_sinai',
       text:{fr:'Trois mois après la sortie d\'Égypte, Israël campe au Sinaï. Dieu descend dans le feu, le tonnerre et la nuée. Moïse monte seul sur la montagne. Il en revient avec les Tables de la Loi gravées par Dieu lui-même : les Dix Commandements.',en:'Three months after leaving Egypt, Israel camps at Sinai. God descends in fire, thunder and cloud. Moses climbs alone up the mountain. He returns with the Tablets of the Law engraved by God himself: the Ten Commandments.',mg:'Telo volana taorian\'ny nialan\'i Israely tany Egypta, nitoby teo amin\'ny Sinay izy ireo.'},
       hist:{fr:'La Torah est la base du judaïsme et a influencé le droit de toute la civilisation occidentale. Les Dix Commandements se retrouvent dans les codes juridiques de nombreux pays.',en:'The Torah is the foundation of Judaism and has influenced the law of all Western civilization. The Ten Commandments appear in the legal codes of many countries.',mg:'Ny Torah no fototr\'ny Jodaisma ary misy fiantraikany tamin\'ny lalàn\'ny sivilizasiona andrefana rehetra.'}},
      {ref:'Deut 34', title:{fr:'La mort de Moïse sur le mont Nébo',en:'The death of Moses on Mount Nebo',mg:'Fahafatesan\'i Mosesy teo an\'i Nebo'}, illus:'moise_sinai',
       text:{fr:'Moïse monte sur le mont Nébo. Dieu lui montre toute la Terre promise — de Dan à Beersheba. "C\'est le pays que j\'ai promis à Abraham, Isaac et Jacob. Je te l\'ai fait voir de tes yeux, mais tu n\'y entreras pas." Moïse meurt là à 120 ans. Personne ne connaît son tombeau.',en:'Moses climbs Mount Nebo. God shows him all the Promised Land — from Dan to Beersheba. "This is the land I promised to Abraham, Isaac and Jacob. I have let you see it with your eyes, but you will not enter." Moses dies there at 120. No one knows his tomb.',mg:'Niakatra teo an\'ny Tendrombohitra Nebo i Mosesy. Nasehon\'Andriamanitra azy ny Tany Nampanantenaina rehetra.'},
       hist:{fr:'"Prophète sans égal, connu face à face par l\'Éternel" (Deut 34:10). Son tombeau inconnu prévient l\'idolâtrie. L\'Église et la Synagogue le vénèrent comme le premier et plus grand intercesseur.',en:'"A prophet without equal, known face to face by the Lord" (Deut 34:10). His unknown tomb prevents idolatry. Church and Synagogue venerate him as the first and greatest intercessor.',mg:'"Mpaminany tsy misy mitovy" (Deo 34:10). Ny fasany tsy fantatra dia mifahatra amin\'ny fanompoan-tsampy.'}}
    ]
  },

  david: {
    name:{fr:'David',en:'David',mg:'Davida'},
    era:{fr:'~1040-970 av. J.-C.',en:'~1040-970 BC',mg:'~1040-970 tal. J.-K.'},
    testament:'AT',
    icon:'🎵',
    intro:{
      fr:'David — berger, poète, guerrier, roi — est la figure la plus complexe et la plus humaine de l\'Ancien Testament. Choisi par Dieu alors qu\'il n\'était qu\'un adolescent, il terrassa Goliath, fuit la jalousie de Saül, régna sur Israël unifié, pécha gravement, se repentit profondément. Les Psaumes portent son âme.',
      en:'David — shepherd, poet, warrior, king — is the most complex and human figure in the Old Testament. Chosen by God when just a teenager, he slew Goliath, fled Saul\'s jealousy, ruled unified Israel, sinned greatly, repented deeply. The Psalms carry his soul.',
      mg:'I Davida — mpiandry ondry, mpanoratra hira, mpiady, mpanjaka — no endri-teny mavesa-danja sy olombelona indrindra ao amin\'ny Testamenta Taloha.'
    },
    events:[
      {ref:'1 Sam 16', title:{fr:'L\'onction secrète à Bethléem',en:'The secret anointing at Bethlehem',mg:'Ny hosoran\'i Davida mangina tany Betlehema'}, illus:'david_psaume',
       text:{fr:'Samuel est envoyé à Bethléem pour oint l\'un des fils de Jessé. Il passe devant sept fils imposants — Dieu refuse chacun. "L\'homme regarde l\'apparence, mais l\'Éternel regarde le cœur." Le plus jeune, David, gardait les troupeaux. Samuel l\'oint roi au milieu de ses frères.',en:'Samuel is sent to Bethlehem to anoint one of Jesse\'s sons. He passes before seven impressive sons — God refuses each one. "Man looks at the outward appearance, but the Lord looks at the heart." The youngest, David, was tending the flocks. Samuel anoints him king before his brothers.',mg:'Nirahina tany Betlehema i Samoela mba hanosotra iray tamin\'ny zanakalahin\'i Jese.'},
       hist:{fr:'David est oint trois fois : en secret à Bethléem, puis roi de Juda à Hébron (2 Sam 2:4), puis roi de tout Israël (2 Sam 5:3). L\'onction royale fonde le concept de "Messie" (oint).',en:'David is anointed three times: in secret at Bethlehem, then king of Judah at Hebron (2 Sam 2:4), then king of all Israel (2 Sam 5:3). The royal anointing founds the concept of "Messiah" (anointed).',mg:'Nanosotra i Davida indrima: mangina tany Betlehema, mpanjakan\'i Joda tany Hebrona, ary mpanjaka Israely manontolo.'}},
      {ref:'1 Sam 17', title:{fr:'David contre Goliath',en:'David against Goliath',mg:'Davida miady amin\'i Goliata'}, illus:'david_goliat',
       text:{fr:'Goliath, géant philistin de plus de 3 m, défie Israël depuis 40 jours. Tous tremblent. David, jeune berger apportant du pain à ses frères, s\'indigne : "Qui est ce Philistin incirconcis pour défier les armées du Dieu vivant ?" Il refuse l\'armure de Saül, prend sa fronde et cinq pierres lisses. Un seul jet — Goliath s\'effondre.',en:'Goliath, a Philistine giant over 3m tall, has defied Israel for 40 days. Everyone trembles. David, a young shepherd bringing bread to his brothers, is indignant: "Who is this uncircumcised Philistine to defy the armies of the living God?" He refuses Saul\'s armor, takes his sling and five smooth stones. One shot — Goliath falls.',mg:'I Goliata, mpikambana Filistina mirefy 3 metatra mahery, nanolotra fanamby an\'i Israely 40 andro.'},
       hist:{fr:'Une inscription égyptienne de Thutmosis III mentionne les géants Anaqites en Canaan. L\'archéologie a identifié le site de la vallée d\'Éla. La victoire de David est célébrée dans la littérature mondiale comme symbole du petit contre le grand.',en:'An Egyptian inscription of Thutmosis III mentions Anakim giants in Canaan. Archaeology has identified the site of the Elah Valley. David\'s victory is celebrated in world literature as a symbol of the small against the great.',mg:'Voatonon\'i Thutmosis III ao amin\'ny soratra egyptiana ny Anakita lehibe tany Kanana.'}},
      {ref:'Ps 23', title:{fr:'Le Psaume du berger',en:'The shepherd\'s Psalm',mg:'Ny Salamo an\'ny mpiandry ondry'}, illus:'david_psaume',
       text:{fr:'"L\'Éternel est mon berger, je ne manquerai de rien. Il me fait reposer dans de verts pâturages... Même si je marche dans la vallée de l\'ombre de la mort, je ne crains aucun mal, car tu es avec moi." Ce psaume est peut-être le texte le plus aimé de toute la Bible.',en:'"The Lord is my shepherd, I lack nothing. He makes me lie down in green pastures... Even though I walk through the valley of the shadow of death, I will fear no evil, for you are with me." This psalm is perhaps the most beloved text in all the Bible.',mg:'"Ny Tompo no Mpiandry ahy; tsy hahia aho."'},
       hist:{fr:'Les 150 Psaumes forment le livre de prières d\'Israël depuis 3 000 ans. Jésus lui-même cite les Psaumes plusieurs fois dont au moment de la crucifixion (Ps 22 : "Mon Dieu, mon Dieu, pourquoi m\'as-tu abandonné ?")',en:'The 150 Psalms have formed Israel\'s prayer book for 3,000 years. Jesus himself quotes the Psalms several times including at the crucifixion (Ps 22: "My God, my God, why have you forsaken me?")',mg:'Ny Salamo 150 no boky fivavahana an\'i Israely hatramin\'ny 3000 taona lasa.'}}
    ]
  },

  jesus: {
    name:{fr:'Jésus',en:'Jesus',mg:'Jesoa'},
    era:{fr:'~4 av. J.-C. — 30 ap. J.-C.',en:'~4 BC — AD 30',mg:'~4 tal. J.-K. — 30 A.D.'},
    testament:'NT',
    icon:'✝️',
    intro:{
      fr:'Jésus de Nazareth est au cœur de la foi chrétienne — Fils de Dieu incarné, Messie annoncé par les prophètes, Sauveur du monde. Sa vie, sa mort et sa résurrection sont les événements les plus documentés et les plus influents de l\'histoire de l\'humanité.',
      en:'Jesus of Nazareth is at the heart of Christian faith — incarnate Son of God, Messiah announced by the prophets, Savior of the world. His life, death and resurrection are the most documented and most influential events in human history.',
      mg:'I Jesoa avy any Nazareta no fototry ny finoana kristianina — Zanakalahin\'Andriamanitra nolalovan\'ny nofo, Mesia nampanantenain\'ny mpaminany, Mpamonjy izao tontolo izao.'
    },
    events:[
      {ref:'Luc 2:1-20', title:{fr:'La naissance à Bethléem',en:'The birth at Bethlehem',mg:'Nahaterahan\'i Jesoa tany Betlehema'}, illus:'jesus_naissance',
       text:{fr:'Un décret de César Auguste ordonne un recensement. Joseph et Marie voyagent de Nazareth à Bethléem. Il n\'y a pas de place dans l\'hôtellerie. Marie met au monde son fils premier-né, l\'emmaillote et le couche dans une mangeoire. Des anges annoncent la nouvelle à des bergers qui accourent.',en:'A decree from Caesar Augustus orders a census. Joseph and Mary travel from Nazareth to Bethlehem. There is no room at the inn. Mary gives birth to her firstborn son, wraps him in cloths and places him in a manger. Angels announce the news to shepherds who hurry.',mg:'Nilaza fanisana i Aogososy Kaisara. Nandeha tany Betlehema i Josefa sy Maria. Niteraka ny zanany lahy voalohan-teraka i Maria ka nampandrian\'ny ao amin\'ny tranobe.'},
       hist:{fr:'La naissance de Jésus est datée de ~4-6 av. J.-C. par la plupart des historiens (le calendrier a une petite erreur de calcul). Bethléem accomplit la prophétie de Michée 5:1.',en:'Jesus\' birth is dated to ~4-6 BC by most historians (the calendar has a small calculation error). Bethlehem fulfills the prophecy of Micah 5:1.',mg:'Ny nahaterahan\'i Jesoa dia dataina ~4-6 tal. J.-K. araka ny mpahay tantara maro.'}},
      {ref:'Matt 5-7', title:{fr:'Le Sermon sur la Montagne',en:'The Sermon on the Mount',mg:'Ny Toriteny teny an-tendrombohitra'}, illus:'jesus_sermon',
       text:{fr:'"Heureux les pauvres en esprit, car le Royaume des cieux est à eux. Heureux les doux, car ils hériteront la terre..." Les Béatitudes, le Notre Père, l\'amour des ennemis, la règle d\'or — la plus grande allocution morale de l\'histoire humaine.',en:'"Blessed are the poor in spirit, for theirs is the kingdom of heaven. Blessed are the meek, for they shall inherit the earth..." The Beatitudes, the Lord\'s Prayer, love of enemies, the golden rule — the greatest moral address in human history.',mg:'"Sambatra ny malahelo am-panahy, fa azy ny Fanjakan\'ny lanitra."'},
       hist:{fr:'Le Sermon sur la Montagne (Matt 5-7) a influencé Gandhi, Martin Luther King, et des générations de penseurs moraux. Ses principes dépassent le cadre religieux pour toucher l\'universel.',en:'The Sermon on the Mount (Matt 5-7) influenced Gandhi, Martin Luther King, and generations of moral thinkers. Its principles transcend the religious framework to touch the universal.',mg:'Ny Toriteny teny an-tendrombohitra dia nisy fiantraikany tamin\'i Gandhi, Martin Luther King, sy taranaka maro.'}},
      {ref:'Luc 22-23', title:{fr:'La Passion et la Crucifixion',en:'The Passion and Crucifixion',mg:'Ny Filalisan\'i Jesoa sy ny fanomboana azy tamin\'ny hazo fijaliana'}, illus:'jesus_croix',
       text:{fr:'La Cène au Cénacle. L\'arrestation à Gethsémané. Le reniement de Pierre. Le procès devant Pilate. La montée au Golgotha. La crucifixion entre deux larrons. "Père, pardonne-leur, ils ne savent ce qu\'ils font." La mort à la 9e heure. Le voile du Temple se déchire.',en:'The Last Supper in the Upper Room. Arrest in Gethsemane. Peter\'s denial. Trial before Pilate. The ascent to Golgotha. Crucifixion between two criminals. "Father, forgive them, they do not know what they do." Death at the 9th hour. The Temple veil tears.',mg:'Ny Fanasana tao amin\'ny efi-trano ambony. Fisamborana tany Getsemane. Fitsarana teo anatrehan\'i Pilato. Fanomboana tamin\'ny hazo fijaliana.'},
       hist:{fr:'La crucifixion est confirmée par des sources non-chrétiennes : Tacite (Annales 15.44) et Flavius Josèphe (Antiquités judaïques 18.3.3). Elle est datée du 7 avril 30 ap. J.-C. par la plupart des historiens.',en:'The crucifixion is confirmed by non-Christian sources: Tacitus (Annals 15.44) and Josephus (Jewish Antiquities 18.3.3). It is dated April 7, AD 30 by most historians.',mg:'Ny fanomboana dia voaporofo amin\'ny loharano tsy kristianina: Tacite (Annales 15.44) sy Flavius Josefa.'}},
      {ref:'Luc 24, Actes 1', title:{fr:'La Résurrection et l\'Ascension',en:'The Resurrection and Ascension',mg:'Ny nitsanganan\'i Jesoa tamin\'ny maty sy ny niakaran\'i Jesoa'}, illus:'jesus_resurrection',
       text:{fr:'Le troisième jour, le tombeau est vide. Des femmes trouvent les linceuls pliés. L\'ange dit : "Il n\'est pas ici, il est ressuscité." Jésus apparaît à Marie-Madeleine, aux disciples d\'Emmaüs, aux onze. Thomas touche ses plaies. Pendant 40 jours, il enseigne sur le Royaume. Puis il monte au ciel sur le mont des Oliviers.',en:'The third day, the tomb is empty. Women find the folded burial cloths. The angel says: "He is not here, he has risen." Jesus appears to Mary Magdalene, the Emmaus disciples, the eleven. Thomas touches his wounds. For 40 days he teaches about the Kingdom. Then he ascends from the Mount of Olives.',mg:'Ny andro fahatelo, foana ny fasana. Hitany ny lamba misitrika. Nilaza ny anjely: "Tsy eto izy, efa nitsangana."'},
       hist:{fr:'La résurrection est l\'événement fondateur du christianisme. Paul liste les apparitions du ressuscité à 500 personnes dont certaines sont encore vivantes au moment de l\'écriture (1 Co 15:6) — une invitation vérifiable à l\'époque.',en:'The resurrection is the founding event of Christianity. Paul lists appearances of the risen Christ to 500 people, some still alive when written (1 Cor 15:6) — a verifiable invitation at the time.',mg:'Ny nitsanganan\'i Jesoa no fototry ny kristianisma. I Paoly dia manisa ny fisehoany tamin\'ny olona 500.'}}
    ]
  },

  paul: {
    name:{fr:'Paul',en:'Paul',mg:'Paoly'},
    era:{fr:'~5-67 ap. J.-C.',en:'~AD 5-67',mg:'~5-67 A.D.'},
    testament:'NT',
    icon:'📜',
    intro:{
      fr:'Saul de Tarse — pharisien zélé, persécuteur de l\'Église — devint Paul, l\'apôtre des nations, après sa rencontre fulgurante avec le Christ ressuscité sur le chemin de Damas. Ses 13 épîtres fondent la théologie chrétienne. En 3 voyages missionnaires, il porta l\'Évangile de Jérusalem jusqu\'à Rome.',
      en:'Saul of Tarsus — zealous Pharisee, persecutor of the Church — became Paul, apostle to the nations, after his blinding encounter with the risen Christ on the road to Damascus. His 13 epistles found Christian theology. In 3 missionary journeys, he carried the Gospel from Jerusalem to Rome.',
      mg:'I Saoly avy any Tarse — Fariseo mazoto, mpanenjika ny Fiangonana — lasa i Paoly, apostolin\'ny firenena, taorian\'ny fihaonan\'ny tamin\'i Kristy nitsangana tamin\'ny maty.'
    },
    events:[
      {ref:'Actes 9:1-19', title:{fr:'La conversion sur le chemin de Damas',en:'The conversion on the road to Damascus',mg:'Ny niovan\'i Paoly fo teo an-dalana mankany Damaskosy'}, illus:'paul_damas',
       text:{fr:'Saul part pour Damas avec des lettres pour arrêter les disciples. Soudain une lumière l\'enveloppe. Il tombe. "Saul, Saul, pourquoi me persécutes-tu ?" — "Qui es-tu, Seigneur ?" — "Je suis Jésus que tu persécutes." Aveugle 3 jours, il est baptisé par Ananias.',en:'Saul sets out for Damascus with letters to arrest disciples. Suddenly a light surrounds him. He falls. "Saul, Saul, why do you persecute me?" — "Who are you, Lord?" — "I am Jesus whom you persecute." Blind 3 days, he is baptized by Ananias.',mg:'Niainga nankany Damaskosy i Saoly mitondra taratasy hasambotra ny mpianatra.'},
       hist:{fr:'La conversion de Paul est l\'événement humain le plus décisif de l\'histoire du christianisme. Avant lui, le christianisme était une secte juive. Après lui, c\'est une foi universelle.',en:'Paul\'s conversion is the most decisive human event in Christian history. Before him, Christianity was a Jewish sect. After him, it is a universal faith.',mg:'Ny niovan\'i Paoly fo no zava-mitranga manan-danja indrindra tamin\'ny tantaran\'ny kristianisma.'}},
      {ref:'Actes 13-14', title:{fr:'Premier voyage missionnaire',en:'First missionary journey',mg:'Ny diandalana misionary voalohany'}, illus:'paul_predication',
       text:{fr:'L\'Église d\'Antioche, sous l\'impulsion du Saint-Esprit, envoie Barnabas et Paul. Ils parcourent Chypre, puis la Galatie (Antioche de Pisidie, Iconium, Lystre, Derbé). Partout ils annoncent que Jésus est le Messie. Des synagogues se divisent. Des Églises naissent.',en:'The church of Antioch, moved by the Holy Spirit, sends Barnabas and Paul. They travel through Cyprus, then Galatia (Pisidian Antioch, Iconium, Lystra, Derbe). Everywhere they announce Jesus is the Messiah. Synagogues divide. Churches are born.',mg:'Ny Fiangonan\'i Antioka, notaoman\'ny Fanahy Masina, nampandeha an\'i Barnabasy sy Paoly.'},
       hist:{fr:'Le premier voyage missionnaire (~46-48 ap. J.-C.) introduit l\'Évangile en Asie Mineure (actuelle Turquie). Paul y fonde des Églises qui reçoivent plus tard ses lettres (Galates, peut-être).',en:'The first missionary journey (~46-48 AD) introduces the Gospel to Asia Minor (modern Turkey). Paul founds churches there which later receive his letters (Galatians, perhaps).',mg:'Ny diandalana misionary voalohany (~46-48 A.D.) dia nampiditra ny Filazantsara tany Azia Minora (Torkia ankehitriny).'}},
      {ref:'1 Co 13', title:{fr:'L\'hymne à l\'amour',en:'The hymn to love',mg:'Ny hira amin\'ny fitiavana'}, illus:'paul_ephese',
       text:{fr:'"Si je parlais les langues des hommes et des anges, mais que je n\'aie pas l\'amour, je suis un airain qui résonne ou une cymbale qui retentit... L\'amour est patient, l\'amour est serviable... Il supporte tout, il croit tout, il espère tout, il endure tout. L\'amour ne finit jamais."',en:'"If I speak in the tongues of men or of angels, but do not have love, I am only a resounding gong or a clanging cymbal... Love is patient, love is kind... It always protects, always trusts, always hopes, always perseveres. Love never fails."',mg:'"Na dia miteny amin\'ny fitenin\'ny olona sy ny anjely aza aho, nefa tsy manana fitiavana, dia toy ny tantsahin\'ny varahina.'},
       hist:{fr:'Le chapitre 13 de la 1ère Lettre aux Corinthiens est l\'un des textes les plus cités au monde — lu dans d\'innombrables mariages, funérailles et cérémonies. Écrit ~55 ap. J.-C. depuis Éphèse.',en:'Chapter 13 of 1 Corinthians is one of the most quoted texts in the world — read at countless weddings, funerals and ceremonies. Written ~AD 55 from Ephesus.',mg:'Ny toko faha-13 amin\'ny 1 Korintianina dia isan\'ireo lahatsoratra voatonona indrindra eran-tany.'}},
      {ref:'Actes 28', title:{fr:'Arrivée et prédication à Rome',en:'Arrival and preaching in Rome',mg:'Tonga sy nitory tany Roma'}, illus:'paul_naufrage',
       text:{fr:'Après deux ans de détention à Césarée et un naufrage en Méditerranée, Paul arrive à Rome. Il y vit deux ans sous garde militaire, "prêchant le Royaume de Dieu et enseignant ce qui concerne le Seigneur Jésus-Christ, avec une pleine liberté et sans obstacle."',en:'After two years of detention in Caesarea and a Mediterranean shipwreck, Paul arrives in Rome. He lives there two years under military guard, "proclaiming the kingdom of God and teaching about the Lord Jesus Christ with all boldness and without hindrance."',mg:'Taorian\'ny nianjerana roa taona tany Kaisarea sy ny fitsapana tamin\'ny ranomasina, tonga tany Roma i Paoly.'},
       hist:{fr:'La tradition dit que Paul fut décapité à Rome vers 67 ap. J.-C. sous Néron, sur la Via Ostia. La basilique Saint-Paul-hors-les-Murs marque son tombeau traditionnel.',en:'Tradition says Paul was beheaded in Rome around AD 67 under Nero, on the Via Ostia. The Basilica of Saint Paul Outside the Walls marks his traditional tomb.',mg:'Ny fomba amam-panaon\'ny olona dia milaza fa nogadraina tany Roma tokony ho 67 A.D. teo ambanin\'i Nerona i Paoly.'}}
    ]
  },

  marie: {
    name:{fr:'Marie',en:'Mary',mg:'Maria'},
    era:{fr:'~20 av. J.-C. — 50 ap. J.-C.',en:'~20 BC — AD 50',mg:'~20 tal. J.-K. — 50 A.D.'},
    testament:'NT',
    icon:'🌹',
    intro:{
      fr:'Marie de Nazareth — jeune femme simple d\'un village obscur de Galilée — dit "oui" à Dieu et devint la mère du Sauveur. Sa foi silencieuse, sa fidélité au pied de la croix, et sa présence au cénacle pour la Pentecôte font d\'elle la figure féminine centrale de la Bible.',
      en:'Mary of Nazareth — a simple young woman from an obscure Galilean village — said "yes" to God and became the mother of the Savior. Her silent faith, faithfulness at the foot of the cross, and presence in the upper room for Pentecost make her the central female figure of the Bible.',
      mg:'I Maria avy any Nazareta — vehivavy tanora tsotra avy amin\'ny vohikely galiliana — nanao hoe "eny" tamin\'Andriamanitra ka lasa renin\'ny Mpamonjy.'
    },
    events:[
      {ref:'Luc 1:26-38', title:{fr:'L\'Annonciation',en:'The Annunciation',mg:'Ny Fampahafantarana'}, illus:'marie_annonciation',
       text:{fr:'L\'ange Gabriel est envoyé à Nazareth vers une vierge fiancée à Joseph. "Je te salue, toi qui as trouvé grâce auprès de Dieu. Tu concevras et tu enfanteras un fils, et tu lui donneras le nom de Jésus." Marie répond : "Je suis la servante du Seigneur ; qu\'il me soit fait selon ta parole."',en:'The angel Gabriel is sent to Nazareth to a virgin betrothed to Joseph. "Greetings, you who are highly favored! You will conceive and give birth to a son, and you will call him Jesus." Mary answers: "I am the Lord\'s servant. May your word to me be fulfilled."',mg:'Nirahina tany Nazareta ho any amin\'ny virijiny nifanatoavan\'i Josefa i Gabriela. Namaly i Maria: "Indro ny mpanompon\'ny Tompo."'},
       hist:{fr:'Le "fiat" de Marie (qu\'il me soit fait selon ta parole) est considéré dans la théologie chrétienne comme le moment où l\'Incarnation du Fils de Dieu commence. Un oui libre et conscient.',en:'Mary\'s "fiat" (may it be done to me according to your word) is considered in Christian theology as the moment the Incarnation of the Son of God begins. A free and conscious yes.',mg:'Ny "eny" an\'i Maria dia atao hoe ny fotoana nanombohan\'ny nitoeran\'ny Zanakalahin\'Andriamanitra tao amin\'ny nofo.'}},
      {ref:'Luc 1:46-55', title:{fr:'Le Magnificat',en:'The Magnificat',mg:'Ny Magnificat'}, illus:'marie_annonciation',
       text:{fr:'"Mon âme exalte le Seigneur, mon esprit se réjouit en Dieu mon Sauveur... Il a renversé les puissants de leurs trônes et élevé les humbles ; il a comblé de biens les affamés et renvoyé les riches les mains vides." Le plus grand cantique de la Bible après les Psaumes.',en:'"My soul glorifies the Lord and my spirit rejoices in God my Savior... He has brought down rulers from their thrones but has lifted up the humble; he has filled the hungry with good things but has sent the rich away empty." The greatest canticle in the Bible after the Psalms.',mg:'"Isaorana ny Tompo ao am-poko, ary ny fanahiko dia mifaly amin\'Andriamanitra Mpamonjy ahy."'},
       hist:{fr:'Le Magnificat s\'inspire du cantique d\'Anne (1 Sam 2). Il est chanté chaque soir dans la liturgie des Heures (Vêpres) depuis 1 500 ans. Sa dimension sociale et prophétique en fait un texte de référence pour la théologie de la libération.',en:'The Magnificat draws from the canticle of Hannah (1 Sam 2). It has been sung each evening in the Liturgy of the Hours (Vespers) for 1,500 years. Its social and prophetic dimension makes it a reference text for liberation theology.',mg:'Ny Magnificat dia avy amin\'ny hiran\'i Ana (1 Sam 2). Hihiaina isaky ny hariva amin\'ny Vêpres hatramin\'ny taona 1500 lasa.'}},
      {ref:'Jean 19:25-27', title:{fr:'Au pied de la Croix',en:'At the foot of the Cross',mg:'Teo am-pototry ny Hazo Fijaliana'}, illus:'jesus_croix',
       text:{fr:'Pendant que presque tous les disciples ont fui, Marie se tient debout au pied de la croix avec Jean et Marie-Madeleine. Jésus dit à sa mère : "Femme, voici ton fils" et à Jean : "Voici ta mère." Sa présence silencieuse est le plus profond acte de foi et d\'amour de l\'Évangile.',en:'While almost all disciples have fled, Mary stands at the foot of the cross with John and Mary Magdalene. Jesus says to his mother: "Woman, here is your son" and to John: "Here is your mother." Her silent presence is the most profound act of faith and love in the Gospel.',mg:'Teo am-pototry ny hazo fijaliana i Maria niaraka tamin\'i Joana sy Maria Magdalena.'},
       hist:{fr:'La confiance de Jésus mourant à Jean pour veiller sur sa mère souligne l\'importance de la communauté dans la foi. La tradition dit que Jean emmena Marie à Éphèse où ils vécurent jusqu\'à leur mort.',en:'The dying Jesus\' trust in John to care for his mother underlines the importance of community in faith. Tradition says John took Mary to Ephesus where they lived until their deaths.',mg:'Ny fitokian\'i Jesoa tamin\'i Joana mba hikarakara ny reniny dia maneho ny maha-zava-dehibe ny fiarahamonina ao amin\'ny finoana.'}}
    ]
  },

  joseph: {
    name:{fr:'Joseph',en:'Joseph',mg:'Josefa'},
    era:{fr:'~1900-1800 av. J.-C.',en:'~1900-1800 BC',mg:'~1900-1800 tal. J.-K.'},
    testament:'AT',
    icon:'🌾',
    intro:{
      fr:'Joseph, onzième fils de Jacob, est la figure de la Providence par excellence dans la Bible. Vendu par ses frères, esclave, prisonnier injuste, puis vice-roi d\'Égypte — sa vie illustre que Dieu peut transformer le pire des trahisons en bénédiction pour des milliers. Son pardon à ses frères reste l\'un des actes les plus sublimes de l\'AT.',
      en:'Joseph, Jacob\'s eleventh son, is the figure of Providence par excellence in the Bible. Sold by his brothers, enslaved, unjustly imprisoned, then viceroy of Egypt — his life shows that God can transform the worst betrayals into blessing for thousands. His forgiveness of his brothers remains one of the most sublime acts in the OT.',
      mg:'I Josefa, zanakalahin\'i Jakoba fahenina ambin\'ny folo, no endrika ny Fiarovana tsara indrindra ao amin\'ny Baiboly.'
    },
    events:[
      {ref:'Gen 37:3-11', title:{fr:'Les songes de Joseph',en:'Joseph\'s dreams',mg:'Ny nofi an\'i Josefa'}, illus:'joseph_songe',
       text:{fr:'Jacob aime Joseph plus que tous ses autres fils et lui offre une tunique de plusieurs couleurs. Joseph fait deux songes : ses gerbes se dressent tandis que celles de ses frères s\'inclinent ; le soleil, la lune et onze étoiles se prosternent devant lui. Ses frères le jalousent.',en:'Jacob loves Joseph more than all his other sons and gives him a colorful coat. Joseph has two dreams: his sheaves stand while his brothers\' sheaves bow; the sun, moon and eleven stars bow before him. His brothers are jealous.',mg:'Tia an\'i Josefa mihoatra ireo zanany hafa i Jakoba ka nanome azy akanjo maro-loko.'},
       hist:{fr:'La tunique "aux mille couleurs" (kutonet passim en hébreu) signifie peut-être une tunique à manches longues — vêtement de ceux qui ne travaillent pas des mains, symbole de traitement de faveur.',en:'The coat of "many colors" (kutonet passim in Hebrew) may mean a long-sleeved tunic — garment of those who don\'t work with their hands, symbol of preferential treatment.',mg:'Ny "akanjo maro-loko" (kutonet passim amin\'ny hebreo) dia midika angamba akanjo misy tanana lava.'}},
      {ref:'Gen 37:18-36', title:{fr:'Vendu par ses frères à Dotân',en:'Sold by his brothers at Dothan',mg:'Nivarotra azy ny rahalahiny tany Dotana'}, illus:'joseph_songe',
       text:{fr:'Les frères complotent de tuer Joseph. Ruben plaide pour lui — il est jeté dans une citerne. Des marchands ismaélites passent. Juda propose de le vendre plutôt que le tuer. Joseph est vendu pour 20 pièces d\'argent. Ils trempent sa tunique dans le sang d\'un bouc et la montrent à Jacob.',en:'Brothers plot to kill Joseph. Reuben pleads for him — he is thrown into a cistern. Ishmaelite merchants pass by. Judah proposes selling him rather than killing. Joseph is sold for 20 pieces of silver. They dip his tunic in goat\'s blood and show it to Jacob.',mg:'Nitarika hamono an\'i Josefa ny rahalahiny. Nivavaka ho azy i Robena — nazeriny tao am-pantsakana izy.'},
       hist:{fr:'20 sicles d\'argent était le tarif légal d\'un esclave au Bronze moyen (tablettes de Mari, ~1800 av. J.-C.). Ce prix exact dans la Bible témoigne d\'une connaissance précise du contexte historique.',en:'20 shekels of silver was the legal price of a slave in the Middle Bronze Age (Mari tablets, ~1800 BC). This exact price in the Bible shows precise knowledge of the historical context.',mg:'20 sekely volafotsy no vidin\'ny andevo tamin\'ny Bronze Afovoany (takelaka Mari, ~1800 tal. J.-K.).'}},
      {ref:'Gen 41:37-57', title:{fr:'Vice-roi d\'Égypte',en:'Viceroy of Egypt',mg:'Tale Faharoa tany Egypta'}, illus:'joseph_pharaon',
       text:{fr:'En prison, Joseph interprète les songes. Pharaon est troublé par ses deux rêves. Joseph est appelé. Il explique : 7 ans d\'abondance suivis de 7 ans de famine. Pharaon dit : "Puisque Dieu t\'a révélé tout cela, il n\'est personne d\'aussi intelligent et sage que toi." Il lui donne son anneau, des vêtements de lin et un collier d\'or.',en:'In prison, Joseph interprets dreams. Pharaoh is troubled by his two dreams. Joseph is called. He explains: 7 years of plenty followed by 7 years of famine. Pharaoh says: "Since God has made all this known to you, there is no one so discerning and wise as you." He gives him his ring, linen clothes and a gold chain.',mg:'Tao am-ponja, nandika ny nofy i Josefa. Nalahelo ny Farao noho ny nofiny roa.'},
       hist:{fr:'Des textes égyptiens mentionnent des famines sévères liées aux faibles crues du Nil. La fonction de "vizir" (second du Pharaon) est bien documentée sous le Moyen Empire (~2055-1650 av. J.-C.).',en:'Egyptian texts mention severe famines linked to weak Nile floods. The function of "vizier" (second to Pharaoh) is well documented under the Middle Kingdom (~2055-1650 BC).',mg:'Ny rakisoratra egyptiana dia milaza ny amin\'ny mosary mafy vokatry ny kely ny halon\'ny Neily.'}},
      {ref:'Gen 45:1-15', title:{fr:'Le pardon — "Je suis Joseph"',en:'Forgiveness — "I am Joseph"',mg:'Ny famelan-keloka — "Izaho no Josefa"'}, illus:'joseph_freres',
       text:{fr:'Après avoir éprouvé ses frères, Joseph ne peut plus se contenir. Il fait sortir tout le monde. Il pleure si fort que les Égyptiens l\'entendent. "Je suis Joseph ! Mon père est-il encore en vie ?" Ses frères sont stupéfaits. Il les serre dans ses bras : "Ce n\'est pas vous qui m\'avez envoyé ici, c\'est Dieu."',en:'After testing his brothers, Joseph can no longer control himself. He sends everyone out. He weeps so loudly the Egyptians hear. "I am Joseph! Is my father still living?" His brothers are stunned. He embraces them: "It was not you who sent me here, but God."',mg:'Taorian\'ny nitsapany ny rahalahiny, tsy naharetena intsony i Josefa. Nihomehy mafy izy ka ren\'ny Egyptiana.'},
       hist:{fr:'Ce récit de pardon est considéré par des psychologues et des théologiens comme le plus bel exemple de réconciliation dans toute la littérature mondiale. Joseph transforme la trahison en providentielles.',en:'This forgiveness narrative is considered by psychologists and theologians as the finest example of reconciliation in all world literature. Joseph transforms betrayal into providence.',mg:'Io tantaran\'ny famelan-keloka io dia atao hoe ohatra tsara indrindra amin\'ny fampihavanana ao amin\'ny literatioran\'izao tontolo izao.'}}
    ]
  },

  // ===== PATRIARCHES & JUGES =====
  isaac: {
    name:{fr:'Isaac',en:'Isaac',mg:'Isaka'},
    era:{fr:'~1900-1750 av. J.-C.',en:'~1900-1750 BC',mg:'~1900-1750 tal. J.-K.'},
    testament:'AT', icon:'🌿',
    intro:{
      fr:'Isaac, fils du miracle né d\'Abraham et Sara âgés, est la figure de l\'enfant promis. Presque sacrifié sur le mont Morija, il fut épargné par Dieu. Sa vie paisible de patriarche entre Canaan et les puits du Néguev porte en elle la continuité de l\'alliance.',
      en:'Isaac, miracle son born to aged Abraham and Sarah, is the figure of the promised child. Nearly sacrificed on Mount Moriah, he was spared by God. His peaceful patriarchal life between Canaan and the Negev wells carries the continuity of the covenant.',
      mg:'I Isaka, zanaka mahagaga nateraky ny efa antitra i Abrahama sy Sara, no endrik\'ny zaza nampanantenaina.'
    },
    events:[
      {ref:'Gen 22:1-19', title:{fr:'Lié sur l\'autel de Morija',en:'Bound on the altar of Moriah',mg:'Nafatotra teo amin\'ny alitaran\'i Moria'}, illus:'abr_isaac',
       text:{fr:'Isaac monte avec son père Abraham sur le mont Morija en portant le bois du sacrifice. "Mon père, voici le feu et le bois, mais où est l\'agneau ?" Abraham répond : "Dieu y pourvoira." Au moment décisif, l\'ange retient la main d\'Abraham. Un bélier est offert à la place.',en:'Isaac climbs with his father Abraham up Mount Moriah carrying the wood for the sacrifice. "My father, here is the fire and wood, but where is the lamb?" Abraham replies: "God will provide." At the decisive moment, the angel stops Abraham\'s hand. A ram is offered instead.',mg:'Niakatra niaraka tamin\'ny rainy i Isaka teny an\'i Moria mitondra ny hazo fanatitra.'},
       hist:{fr:'Isaac a environ 15-25 ans selon les estimations — il n\'est pas un enfant en bas âge mais un jeune homme capable de porter le bois. Son obéissance volontaire préfigure celle du Christ.',en:'Isaac is about 15-25 years old by estimates — not a young child but a young man capable of carrying the wood. His willing obedience foreshadows that of Christ.',mg:'I Isaka dia tokony ho 15-25 taona — tsy ankizy kely fa tovolahy nahafaka ny hazo.'}},
      {ref:'Gen 24', title:{fr:'Le mariage avec Rébecca',en:'Marriage to Rebekah',mg:'Nanambady an\'i Rebekah'}, illus:'abr_appel',
       text:{fr:'Abraham envoie son serviteur Éliézer en Mésopotamie chercher une femme pour Isaac. Au puits de Nahor, Rébecca offre à boire au serviteur et à ses chameaux — signe de Dieu. Elle accepte de partir aussitôt. Isaac la voit venir dans les champs au soir et l\'aime.',en:'Abraham sends his servant Eliezer to Mesopotamia to find a wife for Isaac. At Nahor\'s well, Rebekah offers water to the servant and his camels — God\'s sign. She agrees to leave at once. Isaac sees her coming across the fields at evening and loves her.',mg:'Nanirahana an\'i Eliezera nankany Mesopotamia hitady vady ho an\'i Isaka i Abrahama.'},
       hist:{fr:'Le récit est l\'une des plus belles histoires d\'amour de la Bible — la Providence divine guidant les destins à travers des gestes simples comme offrir à boire.',en:'This narrative is one of the most beautiful love stories in the Bible — divine Providence guiding destinies through simple gestures like offering water.',mg:'Ity tantara ity no iray amin\'ireo tantaram-pitiavana tsara indrindra ao amin\'ny Baiboly.'}},
      {ref:'Gen 26:1-33', title:{fr:'Isaac et les puits du Néguev',en:'Isaac and the Negev wells',mg:'Isaka sy ny lavaka rano any Negeva'}, illus:'abr_hagar',
       text:{fr:'Pendant une famine, Dieu apparaît à Isaac : "Ne descends pas en Égypte, reste dans ce pays." Isaac creuse à nouveau les puits qu\'Abraham avait creusés. Les bergers philistins se disputent chaque puits. Il en creuse un nouveau qu\'il nomme Rehoboth : "L\'Éternel nous a fait de la place."',en:'During a famine, God appears to Isaac: "Do not go down to Egypt, stay in this land." Isaac reopens the wells Abraham had dug. Philistine shepherds quarrel over each well. He digs a new one he names Rehoboth: "The Lord has made room for us."',mg:'Tamin\'ny mosary, niseho tamin\'i Isaka i Andriamanitra: "Aza midina any Egypta." Nihady lavaka rano indray i Isaka.'},
       hist:{fr:'Les disputes autour des puits révèlent la tension permanente entre les nomades pasteurs et les populations sédentaires en Canaan. L\'eau était une ressource vitale et stratégique.',en:'Disputes over wells reveal the constant tension between pastoral nomads and settled populations in Canaan. Water was a vital and strategic resource.',mg:'Ny fifandiran\'ny lavaka rano dia maneho ny fifandrafiana maharitra teo amin\'ny mpiandry nomada sy ny olona mipetraka.'}}
    ]
  },

  jacob: {
    name:{fr:'Jacob',en:'Jacob',mg:'Jakoba'},
    era:{fr:'~1850-1700 av. J.-C.',en:'~1850-1700 BC',mg:'~1850-1700 tal. J.-K.'},
    testament:'AT', icon:'🌙',
    intro:{
      fr:'Jacob — le supplanteur — est l\'une des figures les plus complexes de la Genèse. Rusé et calculateur, il vola la bénédiction de son frère Ésaü. Mais Dieu choisit cet homme imparfait, le fit lutter avec lui, lui donna le nom d\'Israël, et fit de ses douze fils les pères des douze tribus.',
      en:'Jacob — the supplanter — is one of the most complex figures in Genesis. Cunning and calculating, he stole his brother Esau\'s blessing. But God chose this imperfect man, wrestled with him, gave him the name Israel, and made his twelve sons the fathers of the twelve tribes.',
      mg:'I Jakoba — ny mpangataka — no iray amin\'ireo endrik\'olona sarotra indrindra ao amin\'ny Genesisy.'
    },
    events:[
      {ref:'Gen 28:10-22', title:{fr:'L\'échelle de Jacob',en:'Jacob\'s ladder',mg:'Ny tohatra an\'i Jakoba'}, illus:'abr_appel',
       text:{fr:'Jacob fuit vers Haran après avoir trompé Ésaü. La nuit, il s\'endort sur une pierre. Il rêve d\'une échelle reliant la terre au ciel, avec des anges montant et descendant. Dieu lui dit : "Je suis l\'Éternel, le Dieu d\'Abraham et d\'Isaac. La terre sur laquelle tu es couché, je te la donnerai." Jacob se réveille : "Que ce lieu est redoutable ! C\'est la maison de Dieu."',en:'Jacob flees toward Haran after deceiving Esau. At night, he sleeps on a stone. He dreams of a ladder connecting earth to heaven, with angels ascending and descending. God tells him: "I am the Lord, God of Abraham and Isaac. The land on which you lie I will give to you." Jacob wakes: "How awesome is this place! This is the house of God."',mg:'Nandositra nankany Haran i Jakoba taorian\'ny nandrobe an\'i Esao. Nanonofy ladiera nampifandray ny tany sy ny lanitra izy.'},
       hist:{fr:'Le songe de l\'échelle (Sullam en hébreu) est parfois comparé aux ziggourats de Mésopotamie — escaliers monumentaux reliant la terre aux dieux. Jacob nomme l\'endroit Béthel (Maison de Dieu).',en:'The ladder dream (Sullam in Hebrew) is sometimes compared to Mesopotamian ziggurats — monumental staircases linking earth to the gods. Jacob names the place Bethel (House of God).',mg:'Ny nofy ny ladiera dia ampitahaina indraindray amin\'ny ziggourata mesopotamiana — valanandrom-be mampifandray ny tany sy ny andriamanitra.'}},
      {ref:'Gen 32:22-32', title:{fr:'La lutte avec l\'ange à Peniel',en:'Wrestling with the angel at Peniel',mg:'Niady tamin\'ny anjely tany Peniel'}, illus:'abr_appel',
       text:{fr:'La nuit avant de retrouver Ésaü, Jacob lutte seul avec un inconnu jusqu\'à l\'aube. L\'inconnu lui disloque la hanche mais Jacob refuse de le lâcher sans une bénédiction. L\'inconnu lui dit : "Tu ne t\'appelleras plus Jacob, mais Israël, car tu as lutté avec Dieu et avec les hommes, et tu as été vainqueur."',en:'The night before meeting Esau, Jacob wrestles alone with a stranger until dawn. The stranger dislocates his hip but Jacob refuses to let go without a blessing. The stranger says: "Your name shall no longer be Jacob, but Israel, for you have striven with God and with men, and have prevailed."',mg:'Ny alina talohan\'ny fihaonana tamin\'i Esao, niady tamin\'ny vahiny iray i Jakoba hatramin\'ny maraina.'},
       hist:{fr:'Israël (Yisra\'el) signifie "celui qui lutte avec Dieu" ou "Dieu lutte". Ce moment fondateur donne son nom au peuple entier — la nation d\'Israël est née de cette lutte nocturne.',en:'Israel (Yisra\'el) means "one who strives with God" or "God strives." This founding moment gives its name to the whole people — the nation of Israel was born from this nocturnal struggle.',mg:'Israely (Yisrael) midika hoe "ilay miady amin\'Andriamanitra." Io fotoana io no nanomezana anarana ny vahoaka manontolo.'}},
      {ref:'Gen 37:1-4', title:{fr:'Jacob et ses douze fils',en:'Jacob and his twelve sons',mg:'Jakoba sy ny zanakalahy roa ambin\'ny folo'}, illus:'joseph_songe',
       text:{fr:'Jacob a douze fils de quatre femmes — Léa, Rachel, Zilpa et Bilha. Il aime Joseph plus que tous les autres et lui offre une tunique ornée. Cette préférence engendre la jalousie et la haine des autres frères, menant à la vente de Joseph en Égypte. Pourtant, cette trahison sera l\'instrument de la Providence.',en:'Jacob has twelve sons by four women — Leah, Rachel, Zilpah and Bilhah. He loves Joseph more than all others and gives him an ornamented tunic. This preference breeds jealousy and hatred among the other brothers, leading to Joseph\'s sale into Egypt. Yet this betrayal will be the instrument of Providence.',mg:'I Jakoba dia manan-janakalahy roa ambin\'ny folo avy amin\'ny vehivavy efatra.'},
       hist:{fr:'Les douze fils de Jacob sont les ancêtres éponymes des douze tribus d\'Israël. Leur nom figure dans la liste des tribus dans presque tous les livres historiques de la Bible.',en:'Jacob\'s twelve sons are the eponymous ancestors of the twelve tribes of Israel. Their names appear in the tribal list in nearly every historical book of the Bible.',mg:'Ny zanakalahy roa ambin\'ny folo amin\'i Jakoba no razamben\'ny foko roa ambin\'ny folo amin\'i Israely.'}}
    ]
  },

  josue: {
    name:{fr:'Josué',en:'Joshua',mg:'Josoa'},
    era:{fr:'~1400-1350 av. J.-C.',en:'~1400-1350 BC',mg:'~1400-1350 tal. J.-K.'},
    testament:'AT', icon:'⚔️',
    intro:{
      fr:'Josué, successeur de Moïse, conduisit Israël de la traversée du Jourdain à la conquête de Canaan. Général courageux et homme de foi profonde, il accomplit ce que son maître n\'avait pu faire. Son nom en hébreu — Yehoshua — est la même racine que Jésus : "Dieu sauve".',
      en:'Joshua, Moses\' successor, led Israel from the crossing of the Jordan to the conquest of Canaan. A courageous general and man of deep faith, he accomplished what his master could not. His name in Hebrew — Yehoshua — is the same root as Jesus: "God saves."',
      mg:'I Josoa, mpanaraka an\'i Mosesy, nitarika an\'i Israely tamin\'ny niampitana ny Jordana ka hatramin\'ny nanajanana an\'i Kanana.'
    },
    events:[
      {ref:'Jos 3:14-17', title:{fr:'Traversée du Jourdain',en:'Crossing the Jordan',mg:'Niampita ny Jordana'}, illus:'josue_jordan',
       text:{fr:'Josué commande au peuple de se sanctifier. Les prêtres portant l\'arche d\'alliance s\'avancent dans le Jourdain en crue. Dès que leurs pieds touchent l\'eau, les eaux s\'arrêtent en amont. Tout Israël passe à sec. Douze pierres sont dressées en mémorial.',en:'Joshua commands the people to consecrate themselves. The priests carrying the ark of the covenant step into the flooding Jordan. As soon as their feet touch the water, the waters stop upstream. All Israel crosses on dry ground. Twelve stones are set up as a memorial.',mg:'Nasain\'i Josoa ny vahoaka hanamasina ny tenany. Ny mpisorona nitondra ny Fiaran\'ny Fanekena nidina tao amin\'ny Jordana.'},
       hist:{fr:'La traversée du Jourdain est présentée comme un nouveau passage de la Mer des Roseaux — même structure narrative, même puissance divine. Les 12 pierres rappellent les 12 tribus.',en:'The Jordan crossing is presented as a new passage of the Red Sea — same narrative structure, same divine power. The 12 stones recall the 12 tribes.',mg:'Ny niampitana ny Jordana dia asehon\'ny Baiboly ho nandalo vaovao amin\'ny Ranomasina Mena.'}},
      {ref:'Jos 6', title:{fr:'La chute des murs de Jéricho',en:'The fall of Jericho\'s walls',mg:'Nirodana ny mandan\'i Jeriko'}, illus:'josue_jericho',
       text:{fr:'Dieu donne à Josué un plan militaire insolite : faire tourner l\'armée autour de Jéricho pendant 7 jours, avec 7 prêtres soufflant dans des cornes de bélier. Au 7e jour, 7 tours, puis une longue sonnerie. Le peuple pousse un grand cri. Les murs s\'effondrent. Seule Rahab, qui avait caché les espions, est épargnée.',en:'God gives Joshua an unusual military plan: have the army march around Jericho for 7 days, with 7 priests blowing ram\'s horns. On the 7th day, 7 circuits, then a long blast. The people shout. The walls collapse. Only Rahab, who had hidden the spies, is spared.',mg:'Nomen\'Andriamanitra drafitra tsy mahazatra an\'i Josoa: nandeha manodidina an\'i Jeriko 7 andro ny tafika.'},
       hist:{fr:'L\'archéologue Kathleen Kenyon (1952-1958) a fouillé Jéricho et trouvé des preuves de destruction massive. La datation précise reste débattue entre chercheurs.',en:'Archaeologist Kathleen Kenyon (1952-1958) excavated Jericho and found evidence of massive destruction. The precise dating remains debated among scholars.',mg:'Ny mpahay arkeolojia Kathleen Kenyon (1952-1958) dia nikaroka an\'i Jeriko ka nahita porofo ny fandravana lehibe.'}},
      {ref:'Jos 24:14-27', title:{fr:'L\'alliance à Sichem',en:'The covenant at Shechem',mg:'Ny fanekena tany Sekema'}, illus:'josue_rahab',
       text:{fr:'À la fin de sa vie, Josué réunit toutes les tribus à Sichem. Il retrace l\'histoire du salut depuis Abraham. Puis il lance le défi : "Choisissez aujourd\'hui qui vous voulez servir — les dieux de vos pères ou l\'Éternel." Sa réponse : "Moi et ma maison, nous servirons l\'Éternel." Toutes les tribus renouvellent l\'alliance.',en:'At the end of his life, Joshua gathers all tribes at Shechem. He retraces the history of salvation from Abraham. Then he issues the challenge: "Choose today whom you will serve — your fathers\' gods or the Lord." His answer: "As for me and my house, we will serve the Lord." All tribes renew the covenant.',mg:'Tamin\'ny faran\'ny fiainany, nivory tany Sekema ny foko rehetra.'},
       hist:{fr:'Ce discours d\'alliance à Sichem suit le modèle des traités de suzeraineté hittites du XIVe-XIIIe s. av. J.-C. — preuve que les auteurs bibliques connaissaient les formes diplomatiques de leur époque.',en:'This covenant speech at Shechem follows the model of 14th-13th century BC Hittite suzerainty treaties — proof that biblical authors knew the diplomatic forms of their era.',mg:'Io teny fanekena io tany Sekema dia manaraka ny modely traité hittite.'}}
    ]
  },

  samson: {
    name:{fr:'Samson',en:'Samson',mg:'Samsona'},
    era:{fr:'~1100 av. J.-C.',en:'~1100 BC',mg:'~1100 tal. J.-K.'},
    testament:'AT', icon:'💪',
    intro:{
      fr:'Samson est le héros tragique des Juges — nazaréen consacré dès sa naissance, doté d\'une force surhumaine par l\'Esprit de Dieu, mais constamment vaincu par ses propres passions. Sa vie illustre comment les dons les plus extraordinaires peuvent être détruits par la faiblesse intérieure.',
      en:'Samson is the tragic hero of Judges — a Nazirite consecrated from birth, given superhuman strength by God\'s Spirit, but constantly defeated by his own passions. His life illustrates how the most extraordinary gifts can be destroyed by inner weakness.',
      mg:'I Samsona no mpihaza masoandro ao amin\'ny Mpitsara — voatokana hatrany am-bohoka, nomena hery mahery vaika.'
    },
    events:[
      {ref:'Juges 14:5-6', title:{fr:'Samson déchire un lion',en:'Samson tears a lion apart',mg:'Nandrovitra liona i Samsona'}, illus:'samson_lion',
       text:{fr:'Sur le chemin de Timna pour voir une femme philistine, Samson est attaqué par un lion rugissant. L\'Esprit de l\'Éternel s\'empare de lui. Il déchire le lion à mains nues comme on déchirerait un chevreau. Il ne dit rien à ses parents.',en:'On the way to Timnah to see a Philistine woman, Samson is attacked by a roaring lion. The Spirit of the Lord rushes upon him. He tears the lion apart with his bare hands as one tears a young goat. He says nothing to his parents.',mg:'Tamin\'ny lalana nankany Timna, notafihan\'ny liona i Samsona. Nidina taminy ny fanahin\'ny Tompo ka nandrovitra azy tamin\'ny tanany foana izy.'},
       hist:{fr:'La force de Samson est liée à son voeu nazaréen — ne jamais couper ses cheveux. Ce lien entre force physique et consécration spirituelle est unique dans la Bible.',en:'Samson\'s strength is linked to his Nazirite vow — never cutting his hair. This link between physical strength and spiritual consecration is unique in the Bible.',mg:'Ny herin\'i Samsona dia mifandray amin\'ny voady nazireana — tsy hanapaka volo.'}},
      {ref:'Juges 16:4-21', title:{fr:'Samson et Dalila',en:'Samson and Delilah',mg:'Samsona sy Dalila'}, illus:'samson_dalila',
       text:{fr:'Samson aime Dalila. Les princes philistins la soudoient pour découvrir le secret de sa force. Trois fois il la trompe. La quatrième fois, vaincu par son insistance, il lui révèle la vérité : "Un rasoir n\'a jamais touché ma tête." Elle endort Samson, fait raser ses cheveux. Sa force l\'abandonne. Il est capturé, aveuglé, jeté en prison.',en:'Samson loves Delilah. The Philistine lords bribe her to discover the secret of his strength. Three times he deceives her. The fourth time, worn down by her persistence, he reveals: "A razor has never touched my head." She puts Samson to sleep, has his hair shaved. His strength leaves him. He is captured, blinded, thrown in prison.',mg:'Tia an\'i Dalila i Samsona. Nosoloiny vola ny andrianan\'ny Filistina mba hahalany ny sirian\'ny heriny.'},
       hist:{fr:'Dalila est l\'archétype de la femme tentatrice dans la littérature mondiale. Son nom vient peut-être de l\'hébreu "dal" (faible) ou de l\'arabe "dalal" (coquetterie).',en:'Delilah is the archetype of the tempting woman in world literature. Her name may come from Hebrew "dal" (weak) or Arabic "dalal" (coquetry).',mg:'I Dalila no modely vehivavy mpampiala fo ao amin\'ny literatioran\'izao tontolo izao.'}},
      {ref:'Juges 16:23-30', title:{fr:'La mort héroïque de Samson',en:'Samson\'s heroic death',mg:'Ny fahafatesan\'i Samsona mahery'}, illus:'samson_mort',
       text:{fr:'Aveuglé, emprisonné, Samson est amené au temple de Dagon pour divertir les Philistins. Ses cheveux ont repoussé. Il demande à l\'enfant qui le guide de le placer entre les colonnes. Il prie : "Souviens-toi de moi, Seigneur." Il pousse les colonnes de toutes ses forces. Le temple s\'effondre sur 3 000 personnes. Il tua à sa mort plus qu\'il n\'avait tué de sa vie.',en:'Blinded and imprisoned, Samson is brought to Dagon\'s temple to entertain the Philistines. His hair has grown back. He asks the boy guiding him to place him between the pillars. He prays: "Remember me, Lord." He pushes the pillars with all his strength. The temple collapses on 3,000 people. He killed more at his death than in his life.',mg:'Jamba sy nogadraina, nentina tao an\'ny tempolin\'i Dagona i Samsona. Efa nitombo indray ny volony.'},
       hist:{fr:'La mort de Samson est souvent comparée à celle de Jésus — sacrifice volontaire qui détruit plus d\'ennemis que toute la vie. Hébreux 11:32 cite Samson parmi les héros de la foi.',en:'Samson\'s death is often compared to that of Jesus — a voluntary sacrifice that destroys more enemies than an entire life. Hebrews 11:32 cites Samson among the heroes of faith.',mg:'Ny fahafatesan\'i Samsona dia ampitahaina amin\'ny an\'i Jesoa — fanatitra sitra-po.'}}
    ]
  },

  ruth: {
    name:{fr:'Ruth',en:'Ruth',mg:'Rota'},
    era:{fr:'~1100 av. J.-C.',en:'~1100 BC',mg:'~1100 tal. J.-K.'},
    testament:'AT', icon:'🌾',
    intro:{
      fr:'Ruth la Moabite est l\'une des figures les plus aimées de la Bible. Étrangère qui choisit le Dieu d\'Israël par amour pour sa belle-mère Naomi, elle devient par sa fidélité et son humilité l\'arrière-grand-mère du roi David — et une ancêtre de Jésus. Son livre est un chef-d\'œuvre de tendresse et de Providence.',
      en:'Ruth the Moabite is one of the most beloved figures in the Bible. A foreigner who chooses Israel\'s God out of love for her mother-in-law Naomi, through her faithfulness and humility she becomes King David\'s great-grandmother — and an ancestor of Jesus. Her book is a masterpiece of tenderness and Providence.',
      mg:'I Rota Moabita no iray amin\'ireo endrik\'olona tian\'ny olona indrindra ao amin\'ny Baiboly.'
    },
    events:[
      {ref:'Ruth 1:14-18', title:{fr:'Ruth suit Naomi',en:'Ruth follows Naomi',mg:'Nanaraka an\'i Naomy i Rota'}, illus:'ruth_naomi',
       text:{fr:'Après la mort de leurs maris, Naomi supplie ses brus de retourner dans leurs familles. Orpa repart. Ruth refuse : "Où tu iras, j\'irai. Où tu mourras, je mourrai. Ton peuple sera mon peuple, et ton Dieu sera mon Dieu." Ces mots sont parmi les plus beaux de toute la Bible sur la fidélité.',en:'After their husbands\' deaths, Naomi urges her daughters-in-law to return to their families. Orpah leaves. Ruth refuses: "Where you go I will go. Where you die I will die. Your people will be my people and your God my God." These words are among the most beautiful in all the Bible on faithfulness.',mg:'Taorian\'ny namoizana ny vadiny, nasain\'i Naomy hiverina any amin\'ny fianakaviany ny vinantovavy.'},
       hist:{fr:'Le livre de Ruth est l\'un des deux livres de la Bible portant le nom d\'une femme (avec Esther). Il se déroule "au temps des Juges" — période sombre — mais rayonne de lumière et d\'espoir.',en:'The book of Ruth is one of two Bible books bearing a woman\'s name (with Esther). It is set "in the time of the Judges" — a dark period — but radiates light and hope.',mg:'Ny bokin\'i Rota no iray amin\'ireo boky roa ao amin\'ny Baiboly mitondra anarana vehivavy (miaraka amin\'i Estera).'}},
      {ref:'Ruth 2:1-23', title:{fr:'Ruth glane dans les champs de Boaz',en:'Ruth gleans in Boaz\'s fields',mg:'Nangory tany an\'tanimbarin\'i Boaza i Rota'}, illus:'ruth_boaz',
       text:{fr:'Ruth va glaner les épis oubliés par les moissonneurs selon la loi mosaïque (Lév 19:9). Elle tombe sur le champ de Boaz, parent d\'Élimélec. Boaz remarque son zèle et sa fidélité envers Naomi. Il lui ordonne de glaner uniquement dans son champ et la protège. Il lui fait même servir du pain trempé dans du vinaigre.',en:'Ruth goes to glean the grain left by harvesters according to Mosaic law (Lev 19:9). She happens upon the field of Boaz, a relative of Elimelech. Boaz notices her zeal and faithfulness to Naomi. He tells her to glean only in his field and protects her. He even has her served bread dipped in vinegar.',mg:'Nankany mangory i Rota araka ny lalàna mosesiana (Lev 19:9). Nahita ny tanimbarim\'i Boaza izy.'},
       hist:{fr:'La loi du glanage (Lév 19:9-10) protégeait les pauvres, les étrangers et les veuves. C\'est une des premières lois sociales documentées dans l\'histoire.',en:'The gleaning law (Lev 19:9-10) protected the poor, foreigners and widows. It is one of the first documented social laws in history.',mg:'Ny lalàna fangoroana (Lev 19:9-10) dia niaro ny mahantra, ny vahiny ary ny mpitondratena.'}},
      {ref:'Ruth 4:13-17', title:{fr:'Ruth ancêtre du roi David',en:'Ruth ancestor of King David',mg:'Rota razamben\'ny Mpanjaka Davida'}, illus:'ruth_boaz',
       text:{fr:'Boaz épouse Ruth selon la loi du lévirat. Ils ont un fils : Obed, père de Jessé, père de David. Les femmes du village disent à Naomi : "Bénie soit l\'Éternel qui ne t\'a pas laissée sans rédempteur !" Ruth la Moabite — étrangère, veuve, pauvre — entre dans la généalogie de Jésus (Matthieu 1:5).',en:'Boaz marries Ruth according to levirate law. They have a son: Obed, father of Jesse, father of David. The village women tell Naomi: "Blessed be the Lord who has not left you without a redeemer!" Ruth the Moabite — foreigner, widow, poor — enters the genealogy of Jesus (Matthew 1:5).',mg:'Nanambady an\'i Rota araka ny lalàna levirata i Boaza. Niteraka an\'i Obeda, rain\'i Jese, rain\'i Davida.'},
       hist:{fr:'La présence de Ruth dans la généalogie de Jésus (Matt 1:5) est théologiquement significative — Dieu inclut les étrangers fidèles dans son plan de salut, bien avant le christianisme universel.',en:'Ruth\'s presence in Jesus\' genealogy (Matt 1:5) is theologically significant — God includes faithful foreigners in his plan of salvation, long before universal Christianity.',mg:'Ny fisian\'i Rota ao amin\'ny razamben\'i Jesoa (Mat 1:5) dia manan-danja ara-teolojia.'}}
    ]
  },

  salomon: {
    name:{fr:'Salomon',en:'Solomon',mg:'Solomona'},
    era:{fr:'~970-930 av. J.-C.',en:'~970-930 BC',mg:'~970-930 tal. J.-K.'},
    testament:'AT', icon:'👑',
    intro:{
      fr:'Salomon — fils de David et de Bathsheba — fut le roi le plus glorieux d\'Israël. Doté d\'une sagesse légendaire, bâtisseur du Temple, maître d\'une empire prospère, auteur des Proverbes, de l\'Ecclésiaste et du Cantique des Cantiques. Mais sa grandeur fut sa ruine : mille femmes le détournèrent de Dieu.',
      en:'Solomon — son of David and Bathsheba — was Israel\'s most glorious king. Gifted with legendary wisdom, builder of the Temple, master of a prosperous empire, author of Proverbs, Ecclesiastes and the Song of Songs. But his greatness was his ruin: a thousand wives turned him away from God.',
      mg:'I Solomona — zanakalahin\'i Davida sy Batsheba — no mpanjaka be voninahitra indrindra tamin\'i Israely.'
    },
    events:[
      {ref:'1 Rois 3:5-15', title:{fr:'Salomon demande la sagesse',en:'Solomon asks for wisdom',mg:'Nangataka fahendrena i Solomona'}, illus:'salomon_sagesse',
       text:{fr:'Au début de son règne, Dieu apparaît à Salomon en songe : "Demande ce que tu veux que je te donne." Salomon répond : "Donne à ton serviteur un cœur intelligent pour juger ton peuple et discerner entre le bien et le mal." Dieu est touché par cette humilité. Il lui accorde la sagesse et ajoute richesse et gloire.',en:'At the start of his reign, God appears to Solomon in a dream: "Ask for whatever you want me to give you." Solomon answers: "Give your servant a discerning heart to govern your people and to distinguish between right and wrong." God is moved by this humility. He grants wisdom and adds riches and glory.',mg:'Tamin\'ny fiandohan\'ny fanjakany, niseho tamin\'i Solomona tao amin\'ny nofy i Andriamanitra: "Angataho izay tianao."'},
       hist:{fr:'La demande de sagesse plutôt que de richesse ou de victoires est présentée comme le choix idéal du roi — sage plutôt que puissant. Ce modèle influencera toute la littérature de sagesse (Proverbes, Sagesse, Siracide).',en:'The request for wisdom rather than wealth or victories is presented as the ideal royal choice — wise rather than powerful. This model will influence all wisdom literature (Proverbs, Wisdom, Sirach).',mg:'Ny hangatahana fahendrena fa tsy harena na fandresena dia asehon\'ny Baiboly ho safidy tsara indrindra.'}},
      {ref:'1 Rois 3:16-28', title:{fr:'Le jugement de Salomon',en:'The judgment of Solomon',mg:'Ny fitsaran\'i Solomona'}, illus:'salomon_sagesse',
       text:{fr:'Deux prostituées se disputent un nourrisson vivant. Chacune prétend être la vraie mère. Salomon ordonne : "Apportez-moi un épée. Coupez l\'enfant en deux !" La vraie mère s\'écrie : "Non ! Donnez-lui l\'enfant vivant !" Salomon lui rend l\'enfant. Tout Israël est frappé de la sagesse du roi.',en:'Two prostitutes dispute over a living infant. Each claims to be the true mother. Solomon commands: "Bring me a sword. Cut the child in two!" The true mother cries out: "No! Give her the child alive!" Solomon gives her the child. All Israel is struck by the king\'s wisdom.',mg:'Vehivavy roa mpanao janga nifanditra zaza iray velona. Samy nilaza fa reniny izy ireo.'},
       hist:{fr:'Ce récit est un classique de la littérature mondiale sur la sagesse judiciaire. Des histoires similaires existent dans d\'autres cultures (Inde, Chine) — preuve d\'un archétype universel du bon juge.',en:'This narrative is a world literature classic on judicial wisdom. Similar stories exist in other cultures (India, China) — proof of a universal archetype of the good judge.',mg:'Ity tantara ity no classique ao amin\'ny literatioran\'izao tontolo izao momba ny fahendrena mpitsara.'}},
      {ref:'1 Rois 6-8', title:{fr:'Construction et dédicace du Temple',en:'Building and dedication of the Temple',mg:'Nanorina sy nanokana ny Tempoly'}, illus:'salomon_temple',
       text:{fr:'En 7 ans, Salomon bâtit le Temple de Jérusalem — la demeure terrestre de Dieu. Cèdres du Liban, or, ivoire, pierres taillées. À la dédicace, la nuée de la gloire de Dieu remplit le Temple. Salomon prie : "Les cieux, les cieux des cieux ne peuvent te contenir — combien moins cette maison que j\'ai bâtie !"',en:'In 7 years, Solomon builds the Jerusalem Temple — God\'s earthly dwelling. Cedars of Lebanon, gold, ivory, hewn stones. At the dedication, the cloud of God\'s glory fills the Temple. Solomon prays: "The heavens, even the highest heavens, cannot contain you — how much less this house I have built!"',mg:'Ao anatin\'ny 7 taona, nanorina ny Tempolin\'i Jerosalema i Solomona — ny fonenana an-tany amin\'Andriamanitra.'},
       hist:{fr:'Le Temple de Salomon fut détruit par Nabuchodonosor en 587 av. J.-C. Le Second Temple fut détruit par Titus en 70 ap. J.-C. Il ne reste aujourd\'hui que le Mur des Lamentations.',en:'Solomon\'s Temple was destroyed by Nebuchadnezzar in 587 BC. The Second Temple was destroyed by Titus in AD 70. Today only the Western Wall remains.',mg:'Ny Tempolin\'i Solomona dia nandravain\'i Nabokodonosory tamin\'ny 587 tal. J.-K.'}}
    ]
  },

  pierre: {
    name:{fr:'Pierre',en:'Peter',mg:'Petera'},

// ============================================================
// APP LOGIC
// ============================================================
function t(obj) {
  if (!obj) return '';
  return obj[lang] || obj['fr'] || '';
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.getElementById('search-input').placeholder = lang === 'fr' ? 'Rechercher un personnage...' : lang === 'en' ? 'Search a character...' : 'Karohy ny olona...';
  renderHome();
  populateDropdown();
  renderChips();
}

function populateDropdown() {
  const sel = document.getElementById('char-select');
  const sorted = Object.entries(CHARACTERS).sort((a,b) => t(a[1].name).localeCompare(t(b[1].name)));
  sel.innerHTML = `<option value="">${lang==='fr'?'— Choisir —':lang==='en'?'— Choose —':'— Safidio —'}</option>`;
  sorted.forEach(([id, c]) => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = t(c.name);
    sel.appendChild(opt);
  });
}

function renderChips() {
  const chips = document.getElementById('char-chips');
  chips.innerHTML = '';
  Object.entries(CHARACTERS).forEach(([id, c]) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = t(c.name);
    chip.onclick = () => showChar(id);
    chips.appendChild(chip);
  });
}

function renderHome() {
  const grid = document.getElementById('home-grid');
  grid.innerHTML = '';
  Object.entries(CHARACTERS).forEach(([id, c]) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.innerHTML = `
      <span class="char-card-icon">${c.icon}</span>
      <span class="char-card-name">${t(c.name)}</span>
      <span class="char-card-era">${t(c.era)}</span>
      <span class="char-card-count">${c.events.length} ${lang==='fr'?'événements':lang==='en'?'events':'zava-niseho'}</span>`;
    card.onclick = () => showChar(id);
    grid.appendChild(card);
  });
}

function showChar(id) {
  const c = CHARACTERS[id];
  if (!c) return;
  document.getElementById('home').style.display = 'none';
  document.getElementById('char-detail').style.display = 'block';
  document.getElementById('char-name').textContent = t(c.name);
  document.getElementById('char-meta').textContent = `${t(c.era)} · ${c.testament}`;
  document.getElementById('char-intro').textContent = t(c.intro);
  document.getElementById('events-title').textContent = lang==='fr'?'CHRONOLOGIE DE SA VIE':lang==='en'?'LIFE CHRONOLOGY':'NY TANTARAN\'NY FIAINANY';

  // Highlight active chip
  document.querySelectorAll('.chip').forEach(ch => {
    ch.classList.toggle('active', t(c.name) === ch.textContent);
  });

  const list = document.getElementById('events-list');
  list.innerHTML = '';
  c.events.forEach(ev => {
    const block = document.createElement('div');
    block.className = 'ev-block';
    block.innerHTML = `
      <div class="ev-illustration">${ILLUS[ev.illus] ? `<img src="${ILLUS[ev.illus]}" alt="${t(ev.title)}" loading="lazy">` : ''}</div>
      <div class="ev-body">
        <div class="ev-ref">${ev.ref}</div>
        <div class="ev-title">${t(ev.title)}</div>
        <div class="ev-text">${t(ev.text)}</div>
        <div class="ev-hist"><strong>${lang==='fr'?'CONTEXTE HISTORIQUE':lang==='en'?'HISTORICAL CONTEXT':'TANTARA'}</strong>${t(ev.hist)}</div>
      </div>`;
    list.appendChild(block);
  });
  document.getElementById('content').scrollTop = 0;
}

function showHome() {
  document.getElementById('char-detail').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  document.querySelectorAll('.chip').forEach(ch => ch.classList.remove('active'));
  document.getElementById('char-select').value = '';
  document.getElementById('content').scrollTop = 0;
}

function selectFromDropdown(id) {
  if (id) showChar(id);
}

function onSearch(q) {
  const ql = q.toLowerCase().trim();
  if (!ql) { renderHome(); return; }
  const grid = document.getElementById('home-grid');
  grid.innerHTML = '';
  document.getElementById('home').style.display = 'block';
  document.getElementById('char-detail').style.display = 'none';
  Object.entries(CHARACTERS).forEach(([id, c]) => {
    const nameMatch = t(c.name).toLowerCase().includes(ql);
    const introMatch = t(c.intro).toLowerCase().includes(ql);
    const evMatch = c.events.some(e => t(e.title).toLowerCase().includes(ql) || t(e.text).toLowerCase().includes(ql));
    if (nameMatch || introMatch || evMatch) {
      const card = document.createElement('div');
      card.className = 'char-card';
      card.innerHTML = `
        <span class="char-card-icon">${c.icon}</span>
        <span class="char-card-name">${t(c.name)}</span>
        <span class="char-card-era">${t(c.era)}</span>
        <span class="char-card-count">${c.events.length} ${lang==='fr'?'événements':lang==='en'?'events':'zava-niseho'}</span>`;
      card.onclick = () => showChar(id);
      grid.appendChild(card);
    }
  });
  if (!grid.children.length) {
    grid.innerHTML = `<p style="color:var(--ink3);font-style:italic;padding:20px;grid-column:1/-1;">${lang==='fr'?'Aucun résultat pour':lang==='en'?'No results for':'Tsy misy valiny ho an\''} "${q}"</p>`;
  }
}

// INIT
renderHome();
populateDropdown();
renderChips();
</script>
