<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atlas Biblique">
<meta name="description" content="Explorez la géographie biblique de manière interactive">
<title>Atlas Biblique Interactif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --parch: #f5ead0;
  --parch2: #eedcb4;
  --parch3: #e6ce96;
  --ink: #2c1f0e;
  --ink2: #4a3520;
  --ink3: #6b5030;
  --gold: #b8860b;
  --gold2: #d4a017;
  --olive: #556b2f;
  --olive2: #6b8c3a;
  --water: #4a7fa5;
  --water2: #6ea8cc;
  --sand: #c8a96a;
  --red: #8b2020;
  --purple: #5a3070;
  --teal: #2a6e5a;
  --r: 10px;
  --shadow: 0 2px 12px rgba(44,31,14,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--ink); }
body { font-family: 'Crimson Pro', Georgia, serif; color: var(--ink); }

/* ===== LAYOUT ===== */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: var(--parch); }

/* ===== HEADER ===== */
#header {
  background: var(--ink);
  padding: 10px 16px 8px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 2px solid var(--gold);
  flex-shrink: 0;
}
#header h1 {
  font-family: 'Cinzel', serif;
  font-size: 17px; font-weight: 600;
  color: var(--gold2); letter-spacing: 0.04em;
  flex: 1;
}
#header p { font-size: 11px; color: var(--parch3); letter-spacing: 0.06em; }

/* ===== TABS ===== */
#tabs {
  display: flex; background: var(--ink2);
  border-bottom: 1px solid var(--gold);
  flex-shrink: 0; overflow-x: auto;
  scrollbar-width: none;
}
#tabs::-webkit-scrollbar { display: none; }
.tab {
  font-family: 'Cinzel', serif;
  font-size: 11px; font-weight: 600;
  color: var(--parch3); letter-spacing: 0.05em;
  padding: 9px 14px; cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  background: none; border-top: none; border-left: none; border-right: none;
}
.tab.active { color: var(--gold2); border-bottom-color: var(--gold2); }

/* ===== MAIN CONTENT ===== */
#content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.view.active { display: flex; }

/* ===== MAP VIEW ===== */
#map-view { flex-direction: row; }
#map-wrap { flex: 1; position: relative; overflow: hidden; background: #a8c878; min-width: 0; }
#map-svg { width: 100%; height: 100%; }

#map-panel {
  width: 260px; display: flex; flex-direction: column;
  background: var(--parch); border-left: 1px solid var(--parch3);
  flex-shrink: 0;
}
#map-panel-head {
  padding: 10px 12px; background: var(--ink);
  border-bottom: 1px solid var(--gold);
}
#map-panel-head h3 { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold2); }
#map-panel-head p { font-size: 11px; color: var(--parch3); margin-top: 2px; }

#filter-bar {
  display: flex; gap: 5px; padding: 8px 10px;
  border-bottom: 1px solid var(--parch3);
  flex-wrap: wrap; background: var(--parch2);
}
.fbtn {
  font-size: 10px; font-family: 'Cinzel', serif;
  padding: 3px 8px; border-radius: 99px;
  border: 1px solid var(--ink3); cursor: pointer;
  color: var(--ink2); background: transparent;
  transition: all 0.15s;
}
.fbtn.active { background: var(--ink); color: var(--gold2); border-color: var(--gold); }

#place-detail { flex: 1; overflow-y: auto; padding: 12px; }
.place-empty { text-align: center; color: var(--ink3); font-style: italic; font-size: 13px; margin-top: 30px; line-height: 1.7; }
.place-name { font-family: 'Cinzel', serif; font-size: 16px; color: var(--ink); margin-bottom: 2px; }
.place-loc { font-size: 11px; color: var(--ink3); margin-bottom: 8px; }
.place-era { display: inline-block; font-size: 10px; padding: 2px 9px; border-radius: 99px; margin-bottom: 10px; font-family: 'Cinzel', serif; letter-spacing: 0.05em; }
.era-at { background: #fff3cd; color: #7a5c00; border: 1px solid #d4a017; }
.era-nt { background: #ddeeff; color: #1a4a7a; border: 1px solid #4a7fa5; }
.era-both { background: #e8f5e8; color: #2a5a2a; border: 1px solid #556b2f; }
.place-ctx {
  font-size: 12px; color: var(--ink2); line-height: 1.6;
  padding: 8px 10px; margin-bottom: 12px;
  background: var(--parch2); border-left: 3px solid var(--gold);
  font-style: italic;
}
.ev-card {
  border: 1px solid var(--parch3); border-radius: var(--r);
  padding: 9px 10px; margin-bottom: 9px; background: var(--parch);
  cursor: pointer; transition: border-color 0.15s;
}
.ev-card:hover { border-color: var(--gold); }
.ev-ref { font-size: 11px; color: var(--water); font-weight: 600; margin-bottom: 3px; font-family: 'Cinzel', serif; }
.ev-title { font-size: 13px; font-weight: 600; color: var(--ink); }
.ev-desc { font-size: 12px; color: var(--ink2); margin-top: 3px; line-height: 1.5; }
.ev-hist { font-size: 11px; color: var(--ink3); margin-top: 5px; padding-top: 5px; border-top: 1px solid var(--parch3); line-height: 1.45; font-style: italic; }

/* ===== PARCOURS VIEW ===== */
#parcours-view { overflow: hidden; }
#parc-tabs {
  display: flex; gap: 0; background: var(--parch2);
  border-bottom: 1px solid var(--parch3);
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
}
#parc-tabs::-webkit-scrollbar { display: none; }
.ptab {
  font-family: 'Cinzel', serif; font-size: 11px;
  padding: 9px 14px; cursor: pointer;
  color: var(--ink3); border-bottom: 2px solid transparent;
  white-space: nowrap; background: none;
  border-top: none; border-left: none; border-right: none;
  transition: color 0.2s;
}
.ptab.active { color: var(--ink); border-bottom-color: var(--ink); }

#parc-body { flex: 1; display: flex; overflow: hidden; }
#parc-map { flex: 1; position: relative; overflow: hidden; background: #a8c878; min-width: 0; }
#parc-map-svg { width: 100%; height: 100%; }
#parc-panel { width: 260px; display: flex; flex-direction: column; border-left: 1px solid var(--parch3); background: var(--parch); flex-shrink: 0; }
#parc-panel-head { padding: 10px 12px; background: var(--ink); border-bottom: 1px solid var(--gold); }
#parc-panel-head h3 { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold2); }
#parc-panel-head p { font-size: 11px; color: var(--parch3); margin-top: 2px; }
#parc-nav { display: flex; align-items: center; padding: 8px 10px; border-bottom: 1px solid var(--parch3); background: var(--parch2); gap: 8px; }
#parc-nav button { font-family: 'Cinzel', serif; font-size: 11px; padding: 4px 10px; border: 1px solid var(--ink3); border-radius: var(--r); background: transparent; cursor: pointer; color: var(--ink2); }
#parc-nav button:hover { background: var(--ink); color: var(--gold2); border-color: var(--gold); }
#parc-counter { flex: 1; text-align: center; font-size: 11px; color: var(--ink3); font-family: 'Cinzel', serif; }
#parc-content { flex: 1; overflow-y: auto; padding: 12px; }
.step-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; color: white; margin-bottom: 8px; }
.step-place { font-family: 'Cinzel', serif; font-size: 15px; color: var(--ink); margin-bottom: 2px; }
.step-ref { font-size: 11px; font-weight: 600; margin-bottom: 8px; font-family: 'Cinzel', serif; }
.step-story { font-size: 13px; color: var(--ink); line-height: 1.7; margin-bottom: 10px; }
.step-hist { font-size: 11px; color: var(--ink3); line-height: 1.55; padding: 8px 10px; background: var(--parch2); border-left: 3px solid var(--parch3); font-style: italic; }
.step-hist strong { font-style: normal; color: var(--ink2); display: block; margin-bottom: 2px; }
#mini-steps { display: flex; gap: 5px; padding: 8px 10px; border-top: 1px solid var(--parch3); flex-wrap: wrap; }
.mini-s { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: 'Cinzel', serif; font-weight: 600; cursor: pointer; color: white; opacity: 0.45; border: none; transition: opacity 0.15s; }
.mini-s.active { opacity: 1; }

/* ===== SEARCH VIEW ===== */
#search-view { background: var(--parch); overflow-y: auto; padding: 14px; }
#search-wrap { display: flex; gap: 8px; margin-bottom: 14px; }
#search-input {
  flex: 1; font-family: 'Crimson Pro', serif; font-size: 15px;
  padding: 9px 13px; border: 1px solid var(--parch3);
  border-radius: var(--r); background: var(--parch2); color: var(--ink);
}
#search-input:focus { outline: none; border-color: var(--gold); }
#search-input::placeholder { color: var(--ink3); font-style: italic; }
#search-btn { font-family: 'Cinzel', serif; font-size: 12px; padding: 9px 14px; background: var(--ink); color: var(--gold2); border: none; border-radius: var(--r); cursor: pointer; }
#search-results { display: flex; flex-direction: column; gap: 10px; }
.sr-card {
  background: var(--parch); border: 1px solid var(--parch3);
  border-radius: var(--r); padding: 12px 14px; cursor: pointer;
  transition: border-color 0.15s;
}
.sr-card:hover { border-color: var(--gold); }
.sr-name { font-family: 'Cinzel', serif; font-size: 14px; color: var(--ink); margin-bottom: 3px; }
.sr-tag { font-size: 11px; color: var(--ink3); margin-bottom: 6px; }
.sr-preview { font-size: 12px; color: var(--ink2); line-height: 1.5; font-style: italic; }
.sr-empty { text-align: center; color: var(--ink3); font-style: italic; padding: 30px 0; font-size: 14px; }

/* ===== LANGUE ===== */
#lang-bar { display: flex; gap: 6px; justify-content: flex-end; padding: 4px 10px; background: var(--ink2); }
.lang-btn { font-family: 'Cinzel', serif; font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--gold); cursor: pointer; color: var(--parch3); background: transparent; }
.lang-btn.active { background: var(--gold); color: var(--ink); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--parch2); }
::-webkit-scrollbar-thumb { background: var(--parch3); border-radius: 3px; }

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 600px) {
  #map-view { flex-direction: column; }
  #map-panel { width: 100%; max-height: 42vh; border-left: none; border-top: 1px solid var(--parch3); }
  #parc-body { flex-direction: column; }
  #parc-panel { width: 100%; max-height: 42vh; border-left: none; border-top: 1px solid var(--parch3); }
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div>
      <h1>Atlas Biblique</h1>
      <p>GÉOGRAPHIE SACRÉE INTERACTIVE</p>
    </div>
    <div id="lang-bar">
      <button class="lang-btn active" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('mg')">MG</button>
    </div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <button class="tab active" onclick="showView('map',this)" id="tab-map">Carte</button>
    <button class="tab" onclick="showView('parcours',this)" id="tab-parcours">Parcours</button>
    <button class="tab" onclick="showView('search',this)" id="tab-search">Recherche</button>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- ===== MAP VIEW ===== -->
    <div id="map-view" class="view active">
      <div id="map-wrap">
        <svg id="map-svg" viewBox="0 0 520 560" xmlns="http://www.w3.org/2000/svg">
          <!-- Mer Méditerranée -->
          <rect x="0" y="0" width="110" height="560" fill="#5a9bc0" opacity="0.55"/>
          <!-- Mer Morte -->
          <ellipse cx="292" cy="328" rx="19" ry="42" fill="#4a7fa5" opacity="0.75"/>
          <!-- Mer de Galilée -->
          <ellipse cx="280" cy="178" rx="14" ry="20" fill="#4a7fa5" opacity="0.75"/>
          <!-- Jourdain -->
          <path d="M280 198 Q282 255 292 286" stroke="#4a7fa5" stroke-width="2.5" fill="none"/>
          <!-- Désert Néguev -->
          <rect x="155" y="390" width="210" height="170" fill="#c8a96a" opacity="0.3" rx="6"/>
          <!-- Labels géographiques -->
          <text x="52" y="190" font-size="8" fill="#1a4a7a" text-anchor="middle" transform="rotate(-90,52,190)" font-family="Cinzel, serif">MER MÉDITERRANÉE</text>
          <text x="292" y="332" font-size="7" fill="#1a4a7a" text-anchor="middle" font-family="Cinzel, serif">Mer</text>
          <text x="292" y="341" font-size="7" fill="#1a4a7a" text-anchor="middle" font-family="Cinzel, serif">Morte</text>
          <text x="280" y="181" font-size="7" fill="#1a4a7a" text-anchor="middle" font-family="Cinzel, serif">Galilée</text>
          <text x="218" y="445" font-size="9" fill="#7a5c00" opacity="0.7" font-family="Cinzel, serif">NÉGUEV</text>
          <text x="195" y="235" font-size="8" fill="#4a3520" opacity="0.45" font-family="Cinzel, serif">SAMARIE</text>
          <text x="195" y="305" font-size="8" fill="#4a3520" opacity="0.45" font-family="Cinzel, serif">JUDÉE</text>
          <text x="195" y="190" font-size="8" fill="#4a3520" opacity="0.45" font-family="Cinzel, serif">GALILÉE</text>
          <!-- Points -->
          <g id="map-dots"></g>
        </svg>
      </div>
      <div id="map-panel">
        <div id="map-panel-head">
          <h3 id="mp-title">Carte biblique</h3>
          <p id="mp-sub">Sélectionne un lieu</p>
        </div>
        <div id="filter-bar">
          <button class="fbtn active" onclick="setFilter('tous',this)">Tous</button>
          <button class="fbtn" onclick="setFilter('Genèse',this)">Genèse</button>
          <button class="fbtn" onclick="setFilter('AT',this)">Ancien T.</button>
          <button class="fbtn" onclick="setFilter('NT',this)">Nouveau T.</button>
        </div>
        <div id="place-detail"><p class="place-empty">Touche un lieu sur la carte pour explorer les événements bibliques et leur contexte historique.</p></div>
      </div>
    </div>

    <!-- ===== PARCOURS VIEW ===== -->
    <div id="parcours-view" class="view">
      <div id="parc-tabs">
        <button class="ptab active" onclick="setParcours(0,this)">Abraham</button>
        <button class="ptab" onclick="setParcours(1,this)">Jésus</button>
        <button class="ptab" onclick="setParcours(2,this)">Exode</button>
        <button class="ptab" onclick="setParcours(3,this)">Paul</button>
      </div>
      <div id="parc-body">
        <div id="parc-map">
          <svg id="parc-map-svg" viewBox="0 0 520 560" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="520" height="560" fill="#a8c878"/>
            <rect x="0" y="0" width="110" height="560" fill="#5a9bc0" opacity="0.5"/>
            <ellipse cx="292" cy="328" rx="19" ry="42" fill="#4a7fa5" opacity="0.7"/>
            <ellipse cx="280" cy="178" rx="14" ry="20" fill="#4a7fa5" opacity="0.7"/>
            <path d="M280 198 Q282 255 292 286" stroke="#4a7fa5" stroke-width="2" fill="none"/>
            <rect x="155" y="390" width="210" height="170" fill="#c8a96a" opacity="0.28" rx="6"/>
            <text x="52" y="190" font-size="8" fill="#1a4a7a" text-anchor="middle" transform="rotate(-90,52,190)" font-family="Cinzel, serif">MER MÉDITERRANÉE</text>
            <g id="parc-lines"></g>
            <g id="parc-dots"></g>
          </svg>
        </div>
        <div id="parc-panel">
          <div id="parc-panel-head">
            <h3 id="parc-title">Parcours</h3>
            <p id="parc-desc"></p>
          </div>
          <div id="parc-nav">
            <button onclick="prevStep()">← Préc.</button>
            <span id="parc-counter"></span>
            <button onclick="nextStep()">Suiv. →</button>
          </div>
          <div id="parc-content"></div>
          <div id="mini-steps"></div>
        </div>
      </div>
    </div>

    <!-- ===== SEARCH VIEW ===== -->
    <div id="search-view" class="view">
      <div id="search-wrap">
        <input type="text" id="search-input" placeholder="Lieu, personnage, thème..." oninput="doSearch(this.value)">
        <button id="search-btn" onclick="doSearch(document.getElementById('search-input').value)">Chercher</button>
      </div>
      <div id="search-results"><p class="sr-empty">Entrez un nom de lieu ou de personnage (ex: Abraham, Paul, Jéricho...)</p></div>
    </div>

  </div>
</div>

<script>

// ============================================================
// RENDERING
// ============================================================

function t(obj) {
  if (!obj) return '';
  return obj[lang] || obj['fr'] || '';
}

function showView(view, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById(view + '-view').classList.add('active');
  btn.classList.add('active');
  if (view === 'parcours') renderParcours();
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.getElementById('mp-title').textContent = I18N[l].map;
  document.getElementById('mp-sub').textContent = I18N[l].select;
  renderMapDots();
  if (activePlace) renderPlaceDetail(activePlace);
  renderParcours();
  renderTabs();
}

function renderTabs() {
  document.getElementById('tab-map').textContent = I18N[lang].map;
  document.getElementById('tab-parcours').textContent = I18N[lang].parcours;
  document.getElementById('tab-search').textContent = I18N[lang].search;
}

// ===== MAP =====
const DOT_COLORS = { AT:'#556b2f', NT:'#2a6e5a', both:'#8b2020' };

function renderMapDots() {
  const svg = document.getElementById('map-dots');
  svg.innerHTML = '';
  Object.entries(PLACES).forEach(([id, p]) => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.style.cursor = 'pointer';
    g.onclick = () => selectPlace(id);

    const isActive = activePlace === id;
    const col = p.color || DOT_COLORS[p.era] || '#556b2f';

    const outer = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    outer.setAttribute('cx', p.x); outer.setAttribute('cy', p.y);
    outer.setAttribute('r', isActive ? '10' : '7');
    outer.setAttribute('fill', col);
    outer.setAttribute('opacity', isActive ? '1' : '0.75');
    if (isActive) { outer.setAttribute('stroke', '#f5ead0'); outer.setAttribute('stroke-width', '2'); }

    const inner = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    inner.setAttribute('cx', p.x); inner.setAttribute('cy', p.y);
    inner.setAttribute('r', '3');
    inner.setAttribute('fill', 'white'); inner.setAttribute('opacity', '0.85');

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', p.x + 11); label.setAttribute('y', p.y + 4);
    label.setAttribute('font-size', '9'); label.setAttribute('fill', '#2c1f0e');
    label.setAttribute('font-family', 'Cinzel, serif'); label.setAttribute('pointer-events', 'none');
    label.textContent = t(p.name);

    g.appendChild(outer); g.appendChild(inner); g.appendChild(label);
    svg.appendChild(g);
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (activePlace) renderPlaceDetail(activePlace);
}

function selectPlace(id) {
  activePlace = id;
  renderMapDots();
  renderPlaceDetail(id);
}

function renderPlaceDetail(id) {
  const p = PLACES[id];
  const detail = document.getElementById('place-detail');
  const eraClass = p.era === 'both' ? 'era-both' : p.era === 'NT' ? 'era-nt' : 'era-at';
  const eraText = p.era === 'both' ? 'AT & NT' : p.era === 'NT' ? 'Nouveau Testament' : 'Ancien Testament';

  let filtered = p.events;
  if (currentFilter === 'AT') filtered = p.events.filter(e => e.era === 'AT');
  if (currentFilter === 'NT') filtered = p.events.filter(e => e.era === 'NT');
  if (currentFilter === 'Genèse') filtered = p.events.filter(e => e.ref && e.ref.startsWith('Gen'));

  let html = `<p class="place-name">${t(p.name)}</p>
    <p class="place-loc">${t(p.modern)}</p>
    <span class="place-era ${eraClass}">${eraText}</span>
    <p class="place-ctx">${t(p.context)}</p>`;

  if (p.people && p.people.length) {
    html += `<p style="font-size:11px;color:var(--ink3);margin-bottom:10px;">${I18N[lang].people} : <span style="color:var(--ink2);">${p.people.join(', ')}</span></p>`;
  }

  if (filtered.length === 0) {
    html += `<p style="font-size:12px;color:var(--ink3);font-style:italic;">Aucun événement pour ce filtre.</p>`;
  } else {
    filtered.forEach(e => {
      html += `<div class="ev-card">
        <div class="ev-ref">${e.ref}</div>
        <div class="ev-title">${t(e.title)}</div>
        <div class="ev-desc">${t(e.desc)}</div>
        <div class="ev-hist">${t(e.hist)}</div>
      </div>`;
    });
  }

  detail.innerHTML = html;
}

// ===== PARCOURS =====
function setParcours(idx, btn) {
  currentParcours = idx;
  currentStep = 0;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderParcours();
}

function renderParcours() {
  const p = PARCOURS_DATA[currentParcours];
  const col = p.color;
  document.getElementById('parc-title').textContent = t(p.name);
  document.getElementById('parc-desc').textContent = t(p.desc);
  document.getElementById('parc-counter').textContent = `${currentStep + 1} / ${p.steps.length}`;

  // Lines
  const lines = document.getElementById('parc-lines');
  lines.innerHTML = '';
  for (let i = 0; i < p.steps.length - 1; i++) {
    const a = p.steps[i], b = p.steps[i + 1];
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
    line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
    line.setAttribute('stroke', col); line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', '5,4'); line.setAttribute('opacity', '0.65');
    lines.appendChild(line);
  }

  // Dots
  const dots = document.getElementById('parc-dots');
  dots.innerHTML = '';
  p.steps.forEach((s, i) => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.style.cursor = 'pointer';
    g.onclick = () => goStep(i);

    const isActive = i === currentStep;
    const outer = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    outer.setAttribute('cx', s.x); outer.setAttribute('cy', s.y);
    outer.setAttribute('r', isActive ? '13' : '9');
    outer.setAttribute('fill', col);
    outer.setAttribute('opacity', isActive ? '1' : '0.5');
    if (isActive) { outer.setAttribute('stroke', '#f5ead0'); outer.setAttribute('stroke-width', '2.5'); }

    const num = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    num.setAttribute('x', s.x); num.setAttribute('y', s.y + 4);
    num.setAttribute('text-anchor', 'middle'); num.setAttribute('font-size', '10');
    num.setAttribute('fill', 'white'); num.setAttribute('font-weight', '600');
    num.setAttribute('font-family', 'Cinzel, serif'); num.setAttribute('pointer-events', 'none');
    num.textContent = i + 1;

    g.appendChild(outer); g.appendChild(num);
    dots.appendChild(g);
  });

  // Step content
  const s = p.steps[currentStep];
  document.getElementById('parc-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div class="step-badge" style="background:${col};">${currentStep + 1}</div>
      <div>
        <div class="step-place">${t(s.place)}</div>
        <div class="step-ref" style="color:${col};">${s.ref}</div>
      </div>
    </div>
    <p class="step-story">${t(s.story)}</p>
    <div class="step-hist"><strong>${I18N[lang].context}</strong>${t(s.hist)}</div>`;

  // Mini steps
  const mini = document.getElementById('mini-steps');
  mini.innerHTML = '';
  p.steps.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'mini-s' + (i === currentStep ? ' active' : '');
    btn.style.background = col;
    btn.textContent = i + 1;
    btn.onclick = () => goStep(i);
    mini.appendChild(btn);
  });
}

function goStep(i) { currentStep = i; renderParcours(); }
function nextStep() { if (currentStep < PARCOURS_DATA[currentParcours].steps.length - 1) { currentStep++; renderParcours(); } }
function prevStep() { if (currentStep > 0) { currentStep--; renderParcours(); } }

// ===== SEARCH =====
function doSearch(q) {
  const res = document.getElementById('search-results');
  if (!q.trim()) { res.innerHTML = `<p class="sr-empty">${I18N[lang].empty}</p>`; return; }
  const ql = q.toLowerCase();
  let html = '';
  Object.entries(PLACES).forEach(([id, p]) => {
    const nameMatch = t(p.name).toLowerCase().includes(ql);
    const ctxMatch = t(p.context).toLowerCase().includes(ql);
    const peopleMatch = (p.people || []).some(per => per.toLowerCase().includes(ql));
    const evMatch = p.events.some(e => t(e.title).toLowerCase().includes(ql) || t(e.desc).toLowerCase().includes(ql));
    if (nameMatch || ctxMatch || peopleMatch || evMatch) {
      const matchTag = peopleMatch ? (p.people || []).filter(per => per.toLowerCase().includes(ql)).join(', ') : '';
      html += `<div class="sr-card" onclick="goToPlace('${id}')">
        <div class="sr-name">${t(p.name)}</div>
        <div class="sr-tag">${matchTag ? '👤 ' + matchTag + ' · ' : ''}${t(p.modern)}</div>
        <div class="sr-preview">${t(p.context).substring(0, 100)}...</div>
      </div>`;
    }
  });
  if (!html) html = `<p class="sr-empty">Aucun résultat pour "${q}"</p>`;
  res.innerHTML = html;
}

function goToPlace(id) {
  showView('map', document.getElementById('tab-map'));
  selectPlace(id);
}

// ===== INIT =====
renderMapDots();
renderParcours();
</script>

<!-- PWA Cache hors-ligne -->
<script>
// Mise en cache de toute la page pour le mode hors-ligne
if ('caches' in window) {
  window.addEventListener('load', () => {
    caches.open('atlas-biblique-v1').then(cache => {
      cache.add(window.location.href).catch(() => {});
    });
  });
}

// Service Worker inline via Blob
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE_NAME = 'atlas-biblique-v1';
const urlsToCache = [self.location.href];

self.addEventListener('install', event => {
  event.waitUntil(
    caches.open(CACHE_NAME).then(cache => {
      return fetch(self.registration.scope).then(response => {
        return cache.put(self.registration.scope, response);
      }).catch(() => {});
    })
  );
  self.skipWaiting();
});

self.addEventListener('activate', event => {
  event.waitUntil(self.clients.claim());
});

self.addEventListener('fetch', event => {
  event.respondWith(
    caches.match(event.request).then(response => {
      if (response) return response;
      return fetch(event.request).then(fetchResponse => {
        if (!fetchResponse || fetchResponse.status !== 200) return fetchResponse;
        const responseToCache = fetchResponse.clone();
        caches.open(CACHE_NAME).then(cache => {
          cache.put(event.request, responseToCache);
        });
        return fetchResponse;
      }).catch(() => caches.match(event.request));
    })
  );
});`;

  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: './'}).then(reg => {
    console.log('SW enregistré');
  }).catch(err => {
    console.log('SW erreur:', err);
  });
}
</script>
